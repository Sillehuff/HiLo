<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Hilo Playlist - Instructor Edition</title>
  <meta name="description" content="Class planning and playlist freshness for instructors." />
  <meta name="theme-color" content="#FAFAF8" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <style>
    /* ═══════════════════════════════════════════════════
       1. DESIGN TOKENS — palette, type, radius, motion
       (ported from prototype/styles.css and proto-styles.css)
       ═══════════════════════════════════════════════════ */
    :root {
      /* Violet ramp */
      --violet-1: #FDFCFE;
      --violet-2: #F9F7FC;
      --violet-3: #F3EEFB;
      --violet-4: #EAE2F8;
      --violet-5: #DDD1F3;
      --violet-6: #CFBCEB;
      --violet-7: #BCA4DF;
      --violet-8: #A48ACF;
      --violet-9: #6E56CF;
      --violet-10: #634DBF;
      --violet-11: #5746AF;
      --violet-12: #20134B;

      /* Primary/accent */
      --primary: #6E56CF;
      --primary-hover: #634DBF;
      --primary-soft: #F3EEFB;
      --primary-soft-hover: #EAE2F8;
      --accent: #8a6df0;

      /* Neutrals */
      --gray-1: #FDFCFD;
      --gray-2: #F9F8F9;
      --gray-3: #F3F1F3;
      --gray-4: #ECEAED;
      --gray-5: #E5E2E6;
      --gray-6: #DAD7DC;
      --gray-7: #CBC7D0;
      --gray-8: #B0ABB7;
      --gray-9: #8E8898;
      --gray-10: #837D8D;
      --gray-11: #65606D;
      --gray-12: #211F26;

      /* Layout surfaces */
      --page-bg: #FAFAF8;
      --surface: #FFFFFF;
      --surface-elevated: #FFFFFF;
      --surface-overlay: rgba(250, 250, 248, 0.92);
      --surface-sunken: #F4F3F6;

      /* Text */
      --text-primary: var(--gray-12);
      --text-secondary: var(--gray-11);
      --text-tertiary: var(--gray-9);
      --text-quaternary: var(--gray-8);
      --text-on-primary: #FFFFFF;

      /* Borders */
      --border-light: rgba(0, 0, 0, 0.04);
      --border-subtle: rgba(0, 0, 0, 0.06);
      --border-medium: rgba(0, 0, 0, 0.09);
      --border-default: rgba(0, 0, 0, 0.09);

      /* Semantic */
      --success: #30A46C;
      --success-light: #DDF3E4;
      --warning: #E5A220;
      --warning-light: #FFF1D0;
      --warning-text: #9A6700;
      --info: #3B82C9;
      --info-light: #D5EDFF;
      --danger: #E5484D;
      --danger-light: #FFE0E1;

      /* Shadows */
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 8px 28px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-primary: 0 8px 24px rgba(110, 86, 207, 0.28);

      /* Radius */
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 24px;
      --radius-pill: 999px;

      /* Typography */
      --font-display: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;

      /* Tap target / safe area / motion */
      --tap-target: 44px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ═══════════════════════════════════════════════════
       2. RESET + BASE
       ═══════════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      background: var(--page-bg);
      font-family: var(--font-body);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-size: 14px;
      line-height: 1.45;
      letter-spacing: -0.005em;
    }
    body {
      overflow: hidden; /* the inner scroll container handles scroll */
    }
    button {
      font-family: inherit;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    input, select, textarea {
      font-family: inherit;
      color: inherit;
    }
    a { color: inherit; }

    /* ═══════════════════════════════════════════════════
       3. APP SHELL
       ═══════════════════════════════════════════════════ */
    #app {
      width: 100%;
      max-width: 100%;
      height: 100dvh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--page-bg);
      position: relative;
      overflow: hidden;
    }
    #screen-container {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: var(--page-bg);
      position: relative;
    }
    #screen-container::-webkit-scrollbar { display: none; }

    .hilo-screen {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      background: var(--page-bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.45;
    }
    .hilo-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    .hilo-scroll::-webkit-scrollbar { display: none; }

    .hilo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(var(--safe-top) + 14px) 20px 14px;
      flex-shrink: 0;
      background: var(--page-bg);
    }
    .hilo-header__date {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .hilo-header__title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 24px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-top: 2px;
    }
    .hilo-header__avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--violet-9), var(--violet-6));
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
      cursor: pointer;
    }

    /* Tab bar — sticky to bottom of column */
    #tab-bar {
      flex: 0 0 auto;
      height: calc(64px + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--surface-overlay);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      border-top: 0.5px solid var(--border-medium);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }
    #tab-bar.is-hidden {
      display: none;
    }
    .hilo-tabbar__btn {
      background: transparent;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 6px 4px;
      color: var(--text-quaternary);
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .hilo-tabbar__btn--active { color: var(--primary); }
    .hilo-tabbar__btn svg { display: block; }

    /* FAB */
    .hilo-fab {
      position: absolute;
      right: 16px;
      bottom: calc(64px + var(--safe-bottom) + 16px);
      width: 56px;
      height: 56px;
      border-radius: 28px;
      background: var(--primary);
      color: #fff;
      border: none;
      box-shadow: 0 12px 32px rgba(110,86,207,0.4), 0 4px 12px rgba(110,86,207,0.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s var(--ease-out);
      z-index: 50;
    }
    .hilo-fab:active { transform: scale(0.94); }
    .hilo-fab svg { display: block; }

    /* ═══════════════════════════════════════════════════
       4. SHARED COMPONENT PRIMITIVES
       (buttons, pills, cards, inputs, badges, dividers)
       ═══════════════════════════════════════════════════ */

    /* Buttons */
    .hilo-btn {
      border: none;
      border-radius: var(--radius-md);
      padding: 14px 18px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.15s ease, box-shadow 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: -0.005em;
      -webkit-tap-highlight-color: transparent;
    }
    .hilo-btn--primary {
      background: var(--primary);
      color: var(--text-on-primary);
      box-shadow: var(--shadow-primary);
    }
    .hilo-btn--primary:active { transform: scale(0.98); }
    .hilo-btn--secondary {
      background: var(--surface);
      color: var(--text-primary);
      box-shadow: inset 0 0 0 1.5px var(--gray-5);
    }
    .hilo-btn--ghost {
      background: var(--surface-sunken);
      color: var(--text-primary);
    }
    .hilo-btn--danger {
      background: var(--danger-light);
      color: var(--danger);
    }
    .hilo-btn--lg { padding: 16px 20px; font-size: 16px; border-radius: var(--radius-lg); }
    .hilo-btn--sm { padding: 9px 14px; font-size: 13px; }
    .hilo-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Pills */
    .hilo-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      background: var(--surface-sunken);
      color: var(--text-secondary);
      font-size: 12.5px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .hilo-pill--accent {
      background: var(--primary-soft);
      color: var(--primary);
    }
    .hilo-pill--success { background: var(--success-light); color: var(--success); }
    .hilo-pill--warning { background: var(--warning-light); color: var(--warning-text); }
    .hilo-pill--danger { background: var(--danger-light); color: var(--danger); }

    /* Cards */
    .hilo-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }

    /* Inputs */
    .hilo-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border-medium);
      border-radius: var(--radius-md);
      background: var(--surface);
      font-family: var(--font-body);
      font-size: 16px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s ease;
    }
    .hilo-input:focus { border-color: var(--primary); }

    .hilo-section-label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hilo-divider {
      height: 0.5px;
      background: var(--border-medium);
      width: 100%;
    }

    /* ═══════════════════════════════════════════════════
       5. BOTTOM SHEET PATTERN
       ═══════════════════════════════════════════════════ */
    #sheet-layer {
      position: fixed;
      inset: 0;
      z-index: 500;
      pointer-events: none;
    }
    .hilo-sheet-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s var(--ease-out);
    }
    .hilo-sheet-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .hilo-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s var(--ease-out);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      pointer-events: auto;
      padding-bottom: var(--safe-bottom);
    }
    .hilo-sheet.is-open {
      transform: translateY(0);
    }
    .hilo-sheet--tall { max-height: 92vh; }
    .hilo-sheet--short { max-height: 60vh; }
    .hilo-sheet__handle {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: var(--gray-5);
      margin: 12px auto 0;
      flex-shrink: 0;
    }
    .hilo-sheet__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 8px;
      flex-shrink: 0;
    }
    .hilo-sheet__title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .hilo-sheet__close {
      background: transparent;
      border: none;
      color: var(--text-tertiary);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
    }
    .hilo-sheet__body {
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 20px 24px;
    }
    .hilo-sheet__body::-webkit-scrollbar { display: none; }
    .hilo-sheet__actions {
      display: flex;
      gap: 8px;
      padding: 12px 20px calc(20px + var(--safe-bottom));
      border-top: 0.5px solid var(--border-light);
      flex-shrink: 0;
      background: var(--surface);
    }

    /* Sheet form / field helpers (Phase 3) */
    .sheet-field { margin-bottom: 16px; }
    .sheet-field__label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }
    .sheet-input,
    .sheet-textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border-medium);
      border-radius: var(--radius-md);
      background: var(--surface);
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s ease;
    }
    .sheet-input:focus,
    .sheet-textarea:focus { border-color: var(--primary); }
    .sheet-textarea { min-height: 80px; resize: vertical; line-height: 1.45; }
    .sheet-search {
      position: relative;
      margin-bottom: 10px;
    }
    .sheet-search input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border-medium);
      border-radius: var(--radius-pill);
      background: var(--surface-sunken);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
    }
    .sheet-search input:focus { border-color: var(--primary); background: var(--surface); }
    .sheet-error {
      color: var(--danger);
      font-size: 12.5px;
      margin-top: 6px;
    }
    .sheet-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .sheet-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 13px;
      border-radius: var(--radius-pill);
      background: var(--surface-sunken);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      font-family: var(--font-body);
    }
    .sheet-pill--active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 600;
    }
    .sheet-checkbox-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border-light);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .sheet-checkbox-row:last-child { border-bottom: none; }
    .sheet-checkbox-row__av {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--primary-soft);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }
    .sheet-checkbox-row__name {
      flex: 1;
      min-width: 0;
      font-size: 14.5px;
      color: var(--text-primary);
      font-weight: 500;
    }
    .sheet-checkbox-row__check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border-medium);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: transparent;
    }
    .sheet-checkbox-row--checked .sheet-checkbox-row__check {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .sheet-actions {
      display: flex;
      gap: 8px;
      padding: 12px 20px calc(20px + var(--safe-bottom));
      border-top: 0.5px solid var(--border-light);
      flex-shrink: 0;
      background: var(--surface);
      position: sticky;
      bottom: 0;
    }
    .sheet-actions .hilo-btn--primary { flex: 1; }
    .sheet-actions .hilo-btn--ghost { flex: 0 0 auto; }
    .sheet-tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px 6px 12px;
      border-radius: var(--radius-pill);
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12.5px;
      font-weight: 600;
      border: none;
      cursor: default;
    }
    .sheet-tag-chip__remove {
      background: transparent;
      border: none;
      color: var(--primary);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }
    .sheet-tag-chip__remove:hover { background: rgba(110, 86, 207, 0.15); }

    /* Date strip (Add Class) */
    .sheet-date-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .sheet-date-strip::-webkit-scrollbar { display: none; }
    .sheet-date-cell {
      flex-shrink: 0;
      width: 56px;
      padding: 8px 0;
      border-radius: var(--radius-md);
      background: var(--surface-sunken);
      border: 1.5px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      font-family: var(--font-body);
    }
    .sheet-date-cell__name {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .sheet-date-cell__num {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      font-family: var(--font-display);
    }
    .sheet-date-cell--active {
      background: var(--primary-soft);
      border-color: var(--primary);
    }
    .sheet-date-cell--active .sheet-date-cell__name { color: var(--primary); }
    .sheet-date-cell--active .sheet-date-cell__num { color: var(--primary); }

    /* Time grid (used in add/edit class) */
    .sheet-time-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .sheet-time-grid .sheet-pill {
      justify-content: center;
      padding: 8px 4px;
    }
    .sheet-time-more-link {
      background: transparent;
      border: none;
      color: var(--primary);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 0;
      margin-top: 6px;
      cursor: pointer;
    }

    /* Picker rows (Playlist Picker) */
    .sheet-picker-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 0.5px solid var(--border-light);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      background: transparent;
      border-left: none;
      border-right: none;
      border-top: none;
      width: 100%;
      text-align: left;
    }
    .sheet-picker-row:last-child { border-bottom: none; }
    .sheet-picker-row__num {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--primary-soft);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .sheet-picker-row__meta { flex: 1; min-width: 0; }
    .sheet-picker-row__title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }
    .sheet-picker-row__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .sheet-picker-row__tag {
      font-size: 10.5px;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--surface-sunken);
      color: var(--text-secondary);
      font-weight: 500;
    }
    .sheet-picker-row__sub {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }
    .sheet-picker-row__score {
      flex-shrink: 0;
      text-align: right;
      font-family: var(--font-display);
    }
    .sheet-picker-row__score-num {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .sheet-picker-row__score-label {
      font-size: 10.5px;
      color: var(--text-tertiary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .sheet-picker-row__check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--success);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-left: 6px;
    }
    .sheet-picker-row--current { background: var(--primary-soft); border-radius: 12px; padding-left: 8px; padding-right: 8px; }
    .sheet-picker-empty {
      padding: 32px 0;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 14px;
    }

    /* Sort menu radio rows */
    .sheet-sort-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 0.5px solid var(--border-light);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      background: transparent;
      border-left: none;
      border-right: none;
      border-top: none;
      width: 100%;
      text-align: left;
      font-family: var(--font-body);
      font-size: 14.5px;
      color: var(--text-primary);
    }
    .sheet-sort-row:last-child { border-bottom: none; }
    .sheet-sort-row__radio {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border-medium);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sheet-sort-row--active .sheet-sort-row__radio {
      border-color: var(--primary);
    }
    .sheet-sort-row--active .sheet-sort-row__radio::after {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
    }
    .sheet-sort-row--active { color: var(--primary); font-weight: 600; }

    /* Confirm view (delete) */
    .sheet-confirm {
      padding: 24px 20px 12px;
      text-align: center;
    }
    .sheet-confirm__title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .sheet-confirm__sub {
      font-size: 13.5px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    /* ═══════════════════════════════════════════════════
       6. SIGN-IN BANNER
       ═══════════════════════════════════════════════════ */
    .hilo-signin-banner {
      margin: 0 16px 12px;
      padding: 12px 14px;
      background: linear-gradient(135deg, var(--violet-3), var(--violet-2));
      border: 1px solid var(--violet-5);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hilo-signin-banner__icon {
      width: 32px; height: 32px;
      flex-shrink: 0;
      border-radius: 50%;
      background: var(--primary-soft);
      color: var(--primary);
      display: flex; align-items: center; justify-content: center;
    }
    .hilo-signin-banner__text {
      flex: 1;
      min-width: 0;
    }
    .hilo-signin-banner__title {
      font-family: var(--font-display);
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .hilo-signin-banner__sub {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 1px;
    }
    .hilo-signin-banner__dismiss {
      background: transparent;
      border: none;
      color: var(--text-tertiary);
      width: 28px; height: 28px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      cursor: pointer;
    }
    .hilo-signin-banner__cta {
      flex-shrink: 0;
      background: var(--primary);
      color: #fff;
      border: none;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 12px;
      padding: 7px 12px;
      border-radius: 999px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ═══════════════════════════════════════════════════
       6b. SCHEDULE SCREEN (.a-*)
       ═══════════════════════════════════════════════════ */
    .a-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: calc(var(--safe-top) + 12px) 20px 8px;
      flex-shrink: 0;
      background: var(--page-bg);
      gap: 10px;
    }
    .a-header__left { min-width: 0; flex: 1; }
    .a-header__date {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-tertiary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .a-header__title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 32px;
      color: var(--text-primary);
      letter-spacing: -0.025em;
      margin-top: 2px;
      line-height: 1;
    }
    .a-header__actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .a-header__sparkle {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--violet-3), var(--violet-4));
      color: var(--primary);
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      transition: transform 0.12s ease;
    }
    .a-header__sparkle:active { transform: scale(0.94); }
    .a-header__avatar-wrap {
      position: relative;
      width: 40px; height: 40px;
      flex-shrink: 0;
    }
    .a-header__avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--violet-9), var(--violet-7));
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: -0.01em;
    }
    .a-header__sync-dot {
      position: absolute;
      right: -1px; bottom: -1px;
      width: 11px; height: 11px;
      border-radius: 50%;
      border: 2px solid var(--page-bg);
      background: var(--gray-7);
    }
    .a-header__sync-dot--green { background: var(--success); }
    .a-header__sync-dot--amber { background: var(--warning); }
    .a-header__sync-dot--gray { background: var(--gray-7); }

    /* Sticky week strip */
    .a-week-strip-wrap {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--page-bg);
      padding: 6px 16px 8px;
      box-shadow: 0 1px 0 var(--border-subtle);
    }
    .a-week-strip {
      display: grid;
      grid-template-columns: repeat(7, 1fr) auto;
      gap: 4px;
      align-items: center;
    }
    .a-day-cell {
      text-align: center;
      padding: 6px 0 8px;
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      background: transparent;
      border: none;
      font-family: inherit;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: background 0.12s ease;
    }
    .a-day-cell:active { background: var(--violet-2); }
    .a-day-cell__name {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      color: var(--text-quaternary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .a-day-cell__num {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .a-day-cell__dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0;
    }
    .a-day-cell--has .a-day-cell__dot { opacity: 1; }
    .a-day-cell--today .a-day-cell__num {
      background: var(--primary);
      color: #fff;
      font-weight: 700;
    }
    .a-day-cell--today .a-day-cell__name { color: var(--primary); }
    .a-today-btn {
      flex-shrink: 0;
      margin-left: 4px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      border: none;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.02em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      align-self: center;
    }
    .a-today-btn--hidden { display: none; }

    /* Agenda */
    .a-agenda {
      padding: 4px 16px 100px;
    }
    .a-week-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0 4px;
    }
    .a-week-divider__line {
      flex: 1;
      height: 0.5px;
      background: var(--border-default);
    }
    .a-week-divider__label {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-quaternary);
      text-transform: uppercase;
    }
    .a-day-section {
      margin-top: 18px;
      scroll-margin-top: 60px;
    }
    .a-day-label {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }
    .a-day-label__num {
      width: 28px;
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .a-day-label__name {
      font-size: 12.5px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .a-day-label__month {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-quaternary);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .a-day-section--today .a-day-label__num,
    .a-day-section--today .a-day-label__name {
      color: var(--primary);
    }
    .a-day-section--past .a-day-label__num,
    .a-day-section--past .a-day-label__name {
      color: var(--text-quaternary);
    }

    /* Class row */
    .a-class-row {
      background: var(--surface);
      border-radius: 14px;
      padding: 12px 14px 12px 16px;
      margin-bottom: 8px;
      box-shadow: var(--shadow-xs);
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border: 1.5px solid transparent;
      transition: border-color 0.15s ease;
    }
    .a-class-row::before {
      content: '';
      position: absolute;
      left: 0; top: 14px; bottom: 14px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--gray-5);
    }
    .a-class-row--draft::before { background: var(--warning); }
    .a-class-row--final::before { background: var(--success); }
    .a-class-row--open {
      border-radius: 14px 14px 0 0;
      margin-bottom: 0;
    }
    .a-class-row__time {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      min-width: 56px;
    }
    .a-class-row__main {
      flex: 1;
      min-width: 0;
    }
    .a-class-row__type {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .a-class-row__sub {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .a-class-row__sub-sep {
      width: 2px; height: 2px;
      border-radius: 50%;
      background: var(--text-quaternary);
    }
    .a-class-row__status-draft {
      color: var(--warning-text);
      font-weight: 600;
    }
    .a-class-row__status-final {
      color: var(--success);
      font-weight: 600;
    }
    .a-class-row__chev {
      color: var(--text-quaternary);
      flex-shrink: 0;
      transition: transform 0.2s var(--ease-out);
      display: flex;
      align-items: center;
    }
    .a-class-row__chev--open {
      transform: rotate(90deg);
      color: var(--primary);
    }

    /* Inline expand panel */
    .a-expand {
      background: var(--surface);
      border-radius: 0 0 14px 14px;
      padding: 4px 14px 14px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-xs), 0 8px 24px rgba(110,86,207,0.08);
      border-top: 0.5px solid var(--border-subtle);
      animation: aExpandIn 0.22s var(--ease-out);
      overflow: hidden;
    }
    @keyframes aExpandIn {
      from { opacity: 0; transform: translateY(-4px); max-height: 0; }
      to { opacity: 1; transform: translateY(0); max-height: 1500px; }
    }
    .a-multi-class-chip {
      margin-top: 10px;
      padding: 8px 12px;
      background: var(--violet-3);
      border: 1px solid var(--violet-5);
      border-radius: 999px;
      color: var(--primary);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .a-rec-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--violet-3), var(--violet-2));
      margin-top: 10px;
      cursor: pointer;
      border: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      color: inherit;
    }
    .a-rec-card__num {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), #8a6df0);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 19px;
      letter-spacing: -0.02em;
      flex-shrink: 0;
      box-shadow: 0 6px 16px rgba(110,86,207,0.3);
    }
    .a-rec-card__meta { flex: 1; min-width: 0; }
    .a-rec-card__label {
      font-family: var(--font-display);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--primary);
      text-transform: uppercase;
    }
    .a-rec-card__name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-top: 1px;
      letter-spacing: -0.01em;
    }
    .a-rec-card__why {
      font-size: 11.5px;
      color: var(--text-tertiary);
      margin-top: 1px;
    }
    .a-rec-card__swap {
      flex-shrink: 0;
      background: rgba(255,255,255,0.85);
      color: var(--primary);
      border: none;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 12px;
      padding: 7px 12px;
      border-radius: 999px;
      cursor: pointer;
    }
    .a-expand__section { margin-top: 14px; }
    .a-expand__section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .a-expand__label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      text-transform: uppercase;
    }
    .a-expand__count {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
    }
    .a-field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 0.5px solid var(--border-subtle);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      background: transparent;
      border-left: none;
      border-right: none;
      border-top: none;
      width: 100%;
      font-family: inherit;
      color: inherit;
      text-align: left;
    }
    .a-field-row:last-of-type { border-bottom: none; }
    .a-field-row__label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      text-transform: uppercase;
    }
    .a-field-row__value {
      font-size: 14px;
      color: var(--text-primary);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }
    .a-field-row__value--placeholder { color: var(--text-quaternary); }
    .a-field-row__value .chev { color: var(--text-quaternary); display: inline-flex; align-items: center; }

    /* Guests rows in expand panel */
    .a-guest-list {
      display: flex;
      flex-direction: column;
      background: var(--surface-sunken);
      border-radius: 12px;
      padding: 4px 0;
    }
    .a-guest-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-bottom: 0.5px solid var(--border-subtle);
    }
    .a-guest-row:last-child { border-bottom: none; }
    .a-guest-row__av {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--violet-4);
      color: var(--primary);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .a-guest-row__name {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
      min-width: 0;
    }
    .a-guest-row__last {
      font-size: 11px;
      color: var(--text-tertiary);
      text-align: right;
      line-height: 1.25;
    }
    .a-guest-row__last b {
      display: block;
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--text-secondary);
      font-size: 12px;
      letter-spacing: -0.01em;
    }
    .a-guest-row__last--never b { color: var(--warning-text); }
    .a-guest-row__last--fresh b { color: var(--success); }

    .a-actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
    }
    .a-actions .hilo-btn--primary { flex: 1; }
    .a-delete-link {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 8px 0;
      background: transparent;
      border: none;
      color: var(--text-quaternary);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .a-delete-link:hover { color: var(--danger); }

    /* Empty day */
    .a-empty-day {
      padding: 10px 14px;
      border: 1.5px dashed var(--gray-5);
      border-radius: 14px;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      background: transparent;
      width: 100%;
      font-family: inherit;
    }
    .a-empty-day__cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-weight: 600;
    }
    .a-empty-day--open {
      border-style: solid;
      border-color: var(--primary);
      background: var(--violet-2);
      border-radius: 14px 14px 0 0;
      margin-bottom: 0;
    }
    .a-empty-expand {
      background: var(--violet-2);
      border-radius: 0 0 14px 14px;
      padding: 4px 14px 14px;
      margin-bottom: 12px;
      animation: aExpandIn 0.22s var(--ease-out);
      overflow: hidden;
    }

    /* FAB — schedule-screen specific (sits inside the screen) */
    .a-fab {
      position: absolute;
      right: 16px;
      bottom: calc(64px + var(--safe-bottom) + 16px);
      width: 56px; height: 56px;
      border-radius: 28px;
      background: var(--primary);
      color: #fff;
      border: none;
      box-shadow: 0 12px 32px rgba(110,86,207,0.4), 0 4px 12px rgba(110,86,207,0.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s var(--ease-out);
      z-index: 50;
    }

    .h-week-label {

    .h-stat__lbl {

    /* ═══════════════════════════════════════════════════
       6d. GUESTS SCREEN (.g-*) + GUEST DETAIL (.gd-*)

    /* List screen — search bar reuses .h-search-* pattern */

    .g-search-input {

      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .g-search-input:focus {

    }
    .g-add-row {
      padding: 4px 16px 12px;

    }
    .g-add-button {

      transition: transform 0.1s, box-shadow 0.1s;
    }
    .g-guest-card:active { transform: scale(0.99); }
    .g-guest-card__av {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--violet-9), var(--violet-6));
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;

    }
    .g-guest-card__main {

    .g-guest-card__name {

      color: var(--text-primary);

    }
    .g-guest-card__sub {
      font-size: 12px;

    }
    .g-guest-card__sub .sep {

    .g-guest-card__badge {
      display: inline-flex;

    }
    .g-empty {
      text-align: center;

    }

    /* Guest Detail (pushed screen) */
    .gd-screen {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      background: var(--page-bg);
    }
    .gd-navbar {
      display: flex;

      background: var(--page-bg);
    }
    .gd-back {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: var(--font-body);

      font-size: 14px;

    .gd-title {

      text-align: center;

    .gd-icon-btn {

      box-shadow: var(--shadow-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s, color 0.12s;
    }
    .gd-icon-btn:active { transform: scale(0.94); }
    .gd-icon-btn--danger { color: var(--danger); }
    .gd-icon-btn--danger:active { background: var(--danger-light); }

    .gd-hero {
      text-align: center;
      padding: 20px 16px 8px;
    }
    .gd-hero__av {

      height: 80px;

    .gd-last-card {

    }
    .gd-last-card__main { flex: 1; min-width: 0; }
    .gd-last-card__lbl {
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .gd-last-card__val {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-top: 2px;
    }
    .gd-last-card__sub {
      font-size: 12px;

    .gd-history-list {

    .gd-history-row__title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .gd-history-row__sub {
      font-size: 11px;
      color: var(--text-tertiary);

    }

    }

    /* ═══════════════════════════════════════════════════
       6.X RECOMMENDER SCREEN (.r-*)
       ═══════════════════════════════════════════════════ */
    .r-screen {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--page-bg);
      position: relative;
    }

      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 100px;

    .r-header {

      -webkit-tap-highlight-color: transparent;
    }
    .r-header__back svg {
      transform: rotate(180deg);
    }
    .r-header__titles {
      flex: 1;
      min-width: 0;
    }
    .r-header__date {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-quaternary);
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 4px;
    }
    .r-header__title {
      font-family: var(--font-display);
      font-size: 22px;

    .r-window-row__label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      text-transform: uppercase;
      margin-right: 4px;
    }
    .r-window-pill {
      padding: 6px 12px;
      border: 1.5px solid var(--border-default);

      background: var(--surface);
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-tertiary);

  // ============= BLOCK 2: STATE =============

    modalAttendees: [],

    selectedWindow: 45,

      }
    },
