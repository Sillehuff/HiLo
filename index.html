  // ── Schedule render ──────────────────────────────────────
  function renderScheduleScreen(container, params) {
    const today = new Date();
    const refDateISO = formatDateKey(today);
    const todayWeekStartISO = formatDateKey(getIsoWeekStart(today));

    // Track displayed week — defaults to today's ISO week.
    if (!state.scheduleDisplayedWeekISO) {
      state.scheduleDisplayedWeekISO = todayWeekStartISO;
    }

    // Build agenda and group days by ISO week.
    const { days } = buildAgendaData(refDateISO);

    // Map week-start → days[]; preserve insertion order via an array.
    const weeks = [];
    const weekMap = new Map();
    for (const d of days) {
      let bucket = weekMap.get(d.weekStartISO);
      if (!bucket) {
        bucket = { weekStartISO: d.weekStartISO, days: [] };
        weekMap.set(d.weekStartISO, bucket);
        weeks.push(bucket);
      }
      bucket.days.push(d);
    }

    // Build screen scaffold.
    const screen = document.createElement('div');
    screen.className = 'hilo-screen';
    screen.style.position = 'relative';

    // Scroll container.
    const scroller = document.createElement('div');
    scroller.className = 'hilo-scroll';
    scroller.id = 'a-scroller';
    screen.appendChild(scroller);

    // Header.
    const header = buildScheduleHeader(today);
    scroller.appendChild(header);

    // Sign-in banner.
    if (!state.firebaseUser && !state.signinBannerDismissed) {
      scroller.appendChild(buildSigninBanner());
    }

    // Sticky week strip wrapper. We'll re-render its inner content as the
    // displayed week changes.
    const stickyWrap = document.createElement('div');
    stickyWrap.className = 'a-week-strip-wrap';
    stickyWrap.id = 'a-week-strip-wrap';
    scroller.appendChild(stickyWrap);

    // Build week strip from displayed week.
    refreshWeekStripDOM(stickyWrap, state.scheduleDisplayedWeekISO, todayWeekStartISO, weekMap, scroller);

    // Agenda body.
    const agenda = document.createElement('div');
    agenda.className = 'a-agenda';
    agenda.id = 'a-agenda';
    scroller.appendChild(agenda);

    // Render every week with a divider sentinel + days.
    weeks.forEach(week => {
      const divider = document.createElement('div');
      divider.className = 'a-week-divider';
      divider.dataset.weekStart = week.weekStartISO;
      divider.innerHTML = `
        <div class="a-week-divider__line"></div>
        <div class="a-week-divider__label">${esc(weekDividerLabel(week.weekStartISO, todayWeekStartISO))}</div>
        <div class="a-week-divider__line"></div>`;
      agenda.appendChild(divider);

      week.days.forEach(day => {
        agenda.appendChild(buildDaySection(day, refDateISO));
      });
    });

    // Footer caption.
    const footer = document.createElement('div');
    footer.className = 'a-agenda__footer';
    footer.textContent = 'Keep scrolling to plan further out';
    agenda.appendChild(footer);

    // FAB.
    const fab = document.createElement('button');
    fab.type = 'button';
    fab.className = 'a-fab';
    fab.setAttribute('aria-label', 'Add class');
    fab.innerHTML = ICONS.plus;
    fab.addEventListener('click', () => openAddClassSheet());
    screen.appendChild(fab);

    container.appendChild(screen);

    // Wire IntersectionObserver on dividers to update the displayed week.
    setupWeekStripObserver(scroller, stickyWrap, todayWeekStartISO, weekMap);

    // After mount, scroll today into view (only on first render — avoid
    // re-snapping the user every refresh).
    if (!state.scheduleScrollInitialized) {
      const todayEl = scroller.querySelector(`[data-day-iso="${refDateISO}"]`);
      if (todayEl) {
        // Defer to next frame to allow layout.
        requestAnimationFrame(() => {
          const stickyHeight = stickyWrap.getBoundingClientRect().height || 52;
          const desiredTop = Math.max(0, todayEl.offsetTop - stickyHeight - 8);
          scroller.scrollTo({ top: desiredTop, behavior: 'auto' });
          state.scheduleScrollInitialized = true;
        });
      } else {
        state.scheduleScrollInitialized = true;
      }
    }
  }

  function buildScheduleHeader(today) {
    const dayName = today.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
    const monthName = MONTH_LONG[today.getMonth()].toUpperCase();
    const dateLabel = `${dayName}, ${monthName} ${today.getDate()}`;

    const header = document.createElement('div');
    header.className = 'a-header';

    const left = document.createElement('div');
    left.className = 'a-header__left';
    left.innerHTML = `
      <div class="a-header__date">${esc(dateLabel)}</div>
      <div class="a-header__title">Schedule</div>`;
    header.appendChild(left);

    const actions = document.createElement('div');
    actions.className = 'a-header__actions';

    const sparkleBtn = document.createElement('button');
    sparkleBtn.type = 'button';
    sparkleBtn.className = 'a-header__sparkle';
    sparkleBtn.setAttribute('aria-label', 'Open recommender');
    sparkleBtn.innerHTML = ICONS.sparkle;
    sparkleBtn.addEventListener('click', () => navPush('recommender'));
    actions.appendChild(sparkleBtn);

    const avatarWrap = document.createElement('div');

    header.appendChild(actions);
    return header;

  function buildSigninBanner() {
    const banner = document.createElement('div');

  function refreshWeekStripDOM(wrap, displayedWeekISO, todayWeekISO, weekMap, scroller) {
    // Build the strip for the displayed week. If displayed week isn't
    // present in the agenda, fall back to today's week.
    const weekObj = weekMap.get(displayedWeekISO) || weekMap.get(todayWeekISO);
    if (!weekObj) { wrap.innerHTML = ''; return; }
    const todayISO = formatDateKey(new Date());

    const strip = document.createElement('div');

  function scrollAgendaToDay(scroller, iso) {
    const dayEl = scroller.querySelector(`[data-day-iso="${iso}"]`);
    if (!dayEl) return;
    const stickyEl = scroller.querySelector('#a-week-strip-wrap');
    const stickyHeight = (stickyEl && stickyEl.getBoundingClientRect().height) || 52;
    const desiredTop = Math.max(0, dayEl.offsetTop - stickyHeight - 8);
    scroller.scrollTo({ top: desiredTop, behavior: 'smooth' });
  }

  function setupWeekStripObserver(scroller, stickyWrap, todayWeekISO, weekMap) {
    if (state.scheduleObserver) {
      try { state.scheduleObserver.disconnect(); } catch (e) {}
    }
    const dividers = scroller.querySelectorAll('[data-week-start]');
    if (!dividers.length || typeof IntersectionObserver !== 'function') return;
    const stickyHeight = stickyWrap.getBoundingClientRect().height || 52;
    // We want to switch the displayed week when a divider crosses just below
    // the sticky strip. Use rootMargin to define an active band.
    const obs = new IntersectionObserver((entries) => {
      // Pick the topmost divider currently in the trigger band (the one
      // with the smallest top value but still intersecting) — that's the
      // current week's divider just under the sticky strip.
      let candidate = null;
      let candidateTop = Infinity;
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const rect = entry.boundingClientRect;
          if (rect.top < candidateTop) {
            candidateTop = rect.top;
            candidate = entry.target;
          }
        }
      });
      if (!candidate) return;
      const weekStart = candidate.dataset.weekStart;
      if (weekStart && weekStart !== state.scheduleDisplayedWeekISO) {
        state.scheduleDisplayedWeekISO = weekStart;
        refreshWeekStripDOM(stickyWrap, weekStart, todayWeekISO, weekMap, scroller);
      }
    }, {
      root: scroller,
      // Active "trigger zone" just under the sticky strip.
      rootMargin: `-${Math.round(stickyHeight)}px 0px -75% 0px`,
      threshold: 0
    });
    dividers.forEach(d => obs.observe(d));
    state.scheduleObserver = obs;
  }

    label.innerHTML = `
      <div class="a-day-label__num">${day.date}</div>

      ${showMonth ? `<div class="a-day-label__month">${esc(day.monthShort.toUpperCase())}</div>` : ''}`;

  function populateDaySectionClasses(container, day, refDateISO) {
    container.innerHTML = '';
    if (day.classes.length === 0) {
      const emptyKey = `${day.iso}::empty`;
      const isOpen = state.openClassKey === emptyKey;
      const empty = document.createElement('button');
      empty.type = 'button';
      empty.className = 'a-empty-day' + (isOpen ? ' a-empty-day--open' : '');
      empty.dataset.classKey = emptyKey;
      empty.innerHTML = `
        <span>No class scheduled</span>
        <span class="a-empty-day__cta">${ICONS.plus14}<span>Plan</span></span>`;
      empty.addEventListener('click', () => toggleClassExpand(emptyKey, day, refDateISO));
      container.appendChild(empty);
      if (isOpen) {
        container.appendChild(buildEmptyExpand(day));
      }
      return;
    }

    day.classes.forEach(({ key, cls }) => {
      const isOpen = state.openClassKey === key;
      const row = document.createElement('div');
      const status = (cls.status || 'draft').toLowerCase();
      row.className = 'a-class-row '
        + (status === 'finalized' ? 'a-class-row--final' : 'a-class-row--draft')
        + (isOpen ? ' a-class-row--open' : '');
      row.dataset.classKey = key;
      const playlistLabel = cls.playlist ? `Playlist #${esc(cls.playlist)}` : 'No playlist';
      const guestCount = (cls.attendees instanceof Set ? cls.attendees.size : (cls.attendees || []).length);
      const typeLabel = cls.classType || 'Class';
      const statusHTML = status === 'finalized'
        ? `<span class="a-class-row__sub-sep"></span><span class="a-class-row__status-final">finalized</span>`
        : `<span class="a-class-row__sub-sep"></span><span class="a-class-row__status-draft">draft</span>`;
      row.innerHTML = `
        <div class="a-class-row__time">${esc(timeShortLabel(cls.time))}</div>
        <div class="a-class-row__main">
          <div class="a-class-row__type">${esc(typeLabel)}</div>
          <div class="a-class-row__sub">
            <span>${playlistLabel}</span>
            <span class="a-class-row__sub-sep"></span>
            <span>${guestCount} guest${guestCount === 1 ? '' : 's'}</span>
            ${statusHTML}
          </div>
        </div>
        <div class="a-class-row__chev${isOpen ? ' a-class-row__chev--open' : ''}">${ICONS.chevR16}</div>`;
      row.addEventListener('click', () => toggleClassExpand(key, day, refDateISO, row));
      container.appendChild(row);
      if (isOpen) {
        container.appendChild(buildExpandPanel(key, cls, day, refDateISO));
      }
    });
  }

  function toggleClassExpand(key, day, refDateISO, sourceEl) {
    const wasOpen = state.openClassKey === key;
    state.openClassKey = wasOpen ? null : key;
    // Re-render only this day section to avoid a full tab re-render.
    const scroller = document.getElementById('a-scroller');
    if (!scroller) { renderApp(); return; }
    const section = scroller.querySelector(`[data-day-iso="${day.iso}"]`);
    if (!section) { renderApp(); return; }
    const list = section.querySelector('.a-day-section__classes');
    if (!list) { renderApp(); return; }
    populateDaySectionClasses(list, day, refDateISO);

    if (!wasOpen) {
      // After opening, scroll the row to just below the sticky strip.
      requestAnimationFrame(() => {
        const stickyEl = scroller.querySelector('#a-week-strip-wrap');
        const stickyHeight = (stickyEl && stickyEl.getBoundingClientRect().height) || 52;
        const targetEl = scroller.querySelector(`[data-class-key="${CSS.escape(key)}"]`);
        if (targetEl) {
          const desiredTop = Math.max(0, targetEl.offsetTop - stickyHeight - 8);
          scroller.scrollTo({ top: desiredTop, behavior: 'smooth' });
        }
      });
    }
  }

  function buildExpandPanel(key, cls, day, refDateISO) {
    const wrap = document.createElement('div');
    wrap.className = 'a-expand';

    // Multi-class same-type chip.
    if (cls.classType && day.classes.length >= 2) {
      const sameType = day.classes.filter(c =>
        (c.cls.classType || '').toLowerCase() === (cls.classType || '').toLowerCase());
      if (sameType.length >= 2) {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'a-multi-class-chip';
        chip.innerHTML = `${ICONS.sparkle}<span>Apply to all ${sameType.length} ${esc(cls.classType)} classes today</span>`;
        chip.addEventListener('click', () => {
          state.selectedRecommendationClassKeys = new Set(sameType.map(s => s.key));
          state.recAutoSelectDone = true;
          navPush('recommender');
        });
        wrap.appendChild(chip);
      }
    }

    // Recommendation card. Compute metrics for this class's roster.
    const rosterSet = cls.attendees instanceof Set ? cls.attendees : new Set(cls.attendees || []);
    const metrics = computeMetrics({
      attendees: rosterSet,
      classType: cls.classType || '',
      window: state.selectedWindow,
      date: cls.date || refDateISO
    });
    const best = metrics[0];
    const currentPlaylist = cls.playlist || (best ? best.playlist : '');
    const recCard = document.createElement('button');

    recCard.className = 'a-rec-card';
    const playlistDisplay = currentPlaylist || '?';
    let whyText;

      whyText = 'Add guests to see a recommendation';
    } else if (best && best.playlist === currentPlaylist) {
      const score = Math.round(best.score);
      whyText = `Best playlist · Score ${score}`;
    } else if (best) {
      const score = Math.round(best.score);
      whyText = `Better fit available: #${best.playlist} · Score ${score}`;
    } else {
      whyText = 'Best fit for this group';

    recCard.innerHTML = `
      <div class="a-rec-card__num">${esc(playlistDisplay)}</div>
      <div class="a-rec-card__meta">
        <div class="a-rec-card__label">${day.isToday ? 'Recommended' : 'Selected'}</div>

    // Guest list.

    guestSection.appendChild(headRow);

    const guestList = document.createElement('div');
    guestList.className = 'a-guest-list';
    const guestArray = Array.from(rosterSet);
    if (guestArray.length === 0) {
      const empty = document.createElement('div');

      guestList.appendChild(empty);
    } else {
      guestArray.forEach(name => {
        const lh = lastHeardLineFor(name, currentPlaylist, cls.date || refDateISO);
        const row = document.createElement('div');
        row.className = 'a-guest-row';
        row.innerHTML = `
          <div class="a-guest-row__av">${esc((name[0] || '?').toUpperCase())}</div>
          <div class="a-guest-row__name">${esc(name)}</div>
          <div class="a-guest-row__last${lh.mod ? ' a-guest-row__last--' + lh.mod : ''}">
            <b>${esc(lh.label)}</b>
            ${lh.sub ? `<span>${esc(lh.sub)}</span>` : ''}
          </div>`;
        guestList.appendChild(row);
      });
    }
    guestSection.appendChild(guestList);
    wrap.appendChild(guestSection);

    // Notes preview.
    const notesSection = document.createElement('div');
    notesSection.className = 'a-expand__section';
    const notesText = (cls.notes || '').trim();
    notesSection.innerHTML = `
      <button class="a-field-row" type="button" style="border-bottom:none">
        <div class="a-field-row__label">Notes</div>
        <div class="a-field-row__value${notesText ? '' : ' a-field-row__value--placeholder'}">${esc(notesText || 'Add a note…')} <span class="chev">${ICONS.chevR}</span></div>

    notesSection.querySelector('.a-field-row').addEventListener('click', () => openClassEditSheet(key));
    wrap.appendChild(notesSection);

    // Actions.
    const actions = document.createElement('div');
    actions.className = 'a-actions';
    const draftBtn = document.createElement('button');
    draftBtn.type = 'button';
    draftBtn.className = 'hilo-btn hilo-btn--ghost hilo-btn--sm';
    draftBtn.textContent = 'Save draft';
    draftBtn.addEventListener('click', async () => {
      setLoading(draftBtn, true);
      try {
        const ok = await saveClassToFirestore(key, {
          date: cls.date,
          time: cls.time,
          playlist: cls.playlist || '',
          attendees: rosterSet,
          status: 'draft',
          notes: cls.notes || '',
          classType: cls.classType || ''
        });
        if (ok) showToast('Draft saved', 'success');
      } finally { setLoading(draftBtn, false); }
    });
    actions.appendChild(draftBtn);

    const finalizeBtn = document.createElement('button');
    finalizeBtn.type = 'button';
    finalizeBtn.className = 'hilo-btn hilo-btn--primary hilo-btn--sm';
    finalizeBtn.innerHTML = `${ICONS.check}<span>Finalize</span>`;
    finalizeBtn.addEventListener('click', async () => {
      if (!cls.playlist) { showToast('Pick a playlist first', 'error'); return; }
      if (rosterSet.size === 0) { showToast('Add guests first', 'error'); return; }
      setLoading(finalizeBtn, true);
      try {
        const ok = await saveClassToFirestore(key, {
          date: cls.date,
          time: cls.time,
          playlist: cls.playlist,
          attendees: rosterSet,
          status: 'finalized',
          notes: cls.notes || '',
          classType: cls.classType || ''
        });
        if (ok) {
          await writeRecordsToFirestore({
            date: cls.date,
            time: cls.time,
            playlist: cls.playlist,
            attendees: rosterSet
          });
          state.openClassKey = null;
          showToast('Class finalized', 'success');
        }
      } finally { setLoading(finalizeBtn, false); }
    });
    actions.appendChild(finalizeBtn);
    wrap.appendChild(actions);

    // Delete link.
    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'a-delete-link';
    del.textContent = 'Delete class';
    del.addEventListener('click', async () => {
      const yes = window.confirm('Delete this class? This cannot be undone.');
      if (!yes) return;
      try {
        await deleteClassFromFirestore(key);
        state.openClassKey = null;
        showToast('Class deleted', 'success');
      } catch (e) {
        showToast('Delete failed: ' + (e.message || 'unknown'), 'error');
      }
    });
    wrap.appendChild(del);

    return wrap;
  }

  // ── Guests screen ──────────────────────────────────────
  function renderGuestsScreen(container, params) {
    if (typeof state.guestsSearchQuery !== 'string') state.guestsSearchQuery = '';

    // Build screen scaffold.
    const screen = document.createElement('div');
    screen.className = 'hilo-screen';

    const scroller = document.createElement('div');
    scroller.className = 'hilo-scroll';
    screen.appendChild(scroller);

    // Header — eyebrow shows guest count.

      <div class="hilo-header__title">Guests</div>`;
    header.appendChild(headerLeft);
    const avatar = document.createElement('div');
    avatar.className = 'hilo-header__avatar';
    avatar.textContent = userInitials(state.firebaseUser);
    avatar.addEventListener('click', () => navSwitch('more'));
    header.appendChild(avatar);
    scroller.appendChild(header);

    // Search bar.
    const searchBar = document.createElement('div');
    searchBar.className = 'g-search-bar';
    const searchInput = document.createElement('input');
    searchInput.type = 'text';
    searchInput.className = 'g-search-input';
    searchInput.placeholder = 'Search guests…';
    searchInput.value = state.guestsSearchQuery;
    searchInput.addEventListener('input', (e) => {
      state.guestsSearchQuery = e.target.value;
      refreshList();
    });
    searchBar.appendChild(searchInput);
    scroller.appendChild(searchBar);

    // Add Guest CTA row.
    const addRow = document.createElement('div');
    addRow.className = 'g-add-row';
    const addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.className = 'g-add-button';
    addBtn.innerHTML = `${ICONS.plus14}<span>Add Guest</span>`;
    addBtn.addEventListener('click', () => {
      openAddGuestSheet({ onAdd: () => renderApp() });
    });
    addRow.appendChild(addBtn);
    scroller.appendChild(addRow);

    // Guest list container.
    const listEl = document.createElement('div');
    listEl.className = 'g-list';
    scroller.appendChild(listEl);

    container.appendChild(screen);

    // Pre-compute per-guest stats once (last seen + class count).
    function buildGuestStats() {
      const stats = new Map();
      // Initialise an entry for every guest so the count is right
      // even for guests with no records yet.
      state.allGuests.forEach(name => {
        stats.set(name, { count: 0, lastDate: '' });
      });
      state.records.forEach(r => {
        if (!r.guest) return;
        let s = stats.get(r.guest);
        if (!s) {
          s = { count: 0, lastDate: '' };
          stats.set(r.guest, s);
        }
        s.count += 1;
        if (!s.lastDate || (r.date && r.date > s.lastDate)) {
          s.lastDate = r.date || s.lastDate;
        }
      });
      return stats;
    }

    function refreshList() {
      const stats = buildGuestStats();
      const q = (state.guestsSearchQuery || '').trim().toLowerCase();
      const allNames = Array.from(state.allGuests).sort((a, b) =>
        a.localeCompare(b, undefined, { sensitivity: 'base' })
      );
      const filtered = q
        ? allNames.filter(n => n.toLowerCase().includes(q))
        : allNames;

      // Update eyebrow count — total across allGuests, not the filtered set.
      const eyebrow = header.querySelector('[data-guests-eyebrow]');
      if (eyebrow) {
        eyebrow.textContent = `${allNames.length} ${allNames.length === 1 ? 'GUEST' : 'GUESTS'}`;
      }

      // Render list.
      listEl.innerHTML = '';
      if (allNames.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'g-empty';
        empty.textContent = 'No guests yet. Add your first guest above.';
        listEl.appendChild(empty);
        return;
      }
      if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'g-empty';
        empty.textContent = 'No guests match your search.';
        listEl.appendChild(empty);
        return;
      }

      filtered.forEach(name => {
        listEl.appendChild(buildGuestCard(name, stats.get(name) || { count: 0, lastDate: '' }));
      });
    }

    function buildGuestCard(name, s) {
      const card = document.createElement('div');
      card.className = 'g-guest-card';

      const av = document.createElement('div');
      av.className = 'g-guest-card__av';
      av.textContent = (name && name[0] || '?').toUpperCase();
      card.appendChild(av);

      const main = document.createElement('div');
      main.className = 'g-guest-card__main';

      const nameEl = document.createElement('div');
      nameEl.className = 'g-guest-card__name';
      nameEl.textContent = name;
      main.appendChild(nameEl);

      const sub = document.createElement('div');
      sub.className = 'g-guest-card__sub';
      const classCount = s.count;
      const lastLabel = s.lastDate ? formatGuestDateShort(s.lastDate) : '—';
      sub.innerHTML = `
        <span>${classCount} ${classCount === 1 ? 'class' : 'classes'}</span>
        <span class="sep"></span>
        <span>Last: ${esc(lastLabel)}</span>`;
      main.appendChild(sub);

      // Static "Active" badge — cosmetic stub per locked-in user decision.
      const badge = document.createElement('span');
      badge.className = 'g-guest-card__badge';
      badge.textContent = 'Active';
      main.appendChild(badge);

      card.appendChild(main);

      const chev = document.createElement('div');
      chev.className = 'g-guest-card__chev';
      chev.innerHTML = ICONS.chevR16;
      card.appendChild(chev);

      card.addEventListener('click', () => navPush('guestDetail', { name }));
      return card;
    }

    refreshList();
  }

    const d = parseDateInput(iso);
    if (!d) return iso || '—';
    return `${MONTH_SHORT[d.getMonth()]} ${d.getDate()}`;

    // Local helpers (closure-bound to the current render).
    function renderChips() {
      // Build chip set: 'All' plus types actually used in finalized classes.
      const usedTypes = new Set();
      allFinalized.forEach(e => {
        if (e.classType) usedTypes.add(e.classType);
      });
      // Use getAllClassTypes() to keep ordering consistent, but filter to actually-used.
      const ordered = ['All', ...getAllClassTypes().filter(t => usedTypes.has(t))];
      // Fallback: if filterType isn't 'All' and not in list, reset.
      if (state.historyFilterType !== 'All' && !usedTypes.has(state.historyFilterType)) {
        state.historyFilterType = 'All';
      }
      chipsWrap.innerHTML = '';
      ordered.forEach(t => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'h-filter-chip' + (state.historyFilterType === t ? ' h-filter-chip--active' : '');
        chip.textContent = t;
        chip.addEventListener('click', () => {
          state.historyFilterType = t;
          refreshHistoryEntries();
        });
        chipsWrap.appendChild(chip);
      });
    }

    function renderSortPillLabel() {
      sortPill.textContent = 'Sort: ' + describeHistorySort(state.historySort);
    }

    function refreshHistoryEntries() {
      // Apply filter + search.
      const q = (state.historySearchQuery || '').trim().toLowerCase();
      const filterType = state.historyFilterType || 'All';

      const filtered = allFinalized.filter(e => {
        if (filterType !== 'All' && e.classType !== filterType) return false;
        if (!q) return true;
        if (e.classType && e.classType.toLowerCase().includes(q)) return true;
        const playlistStr = e.playlist ? '#' + String(e.playlist) : '';
        if (playlistStr && playlistStr.toLowerCase().includes(q)) return true;
        if (e.attendeesArr.some(g => g.toLowerCase().includes(q))) return true;
        return false;
      });

      // Sort.
      const sorted = sortHistoryEntries(filtered, state.historySort);

      // Update eyebrow count.
      const eyebrow = header.querySelector('[data-history-eyebrow]');
      if (eyebrow) {
        eyebrow.textContent = `${sorted.length} ${sorted.length === 1 ? 'CLASS' : 'CLASSES'}`;
      }

      // Render chips + sort pill (chip active state can change).
      renderChips();
      renderSortPillLabel();

      // Render entries.
      entriesEl.innerHTML = '';

      if (sorted.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'h-empty';
        empty.textContent = 'No classes match your search';
        entriesEl.appendChild(empty);
      } else if (state.historySort.key === 'date') {
        // Group by week label.
        const groups = [];
        const seen = new Map();
        sorted.forEach(e => {
          const label = e.weekLabel;
          if (!seen.has(label)) {
            const g = { label, items: [] };
            seen.set(label, g);
            groups.push(g);
          }
          seen.get(label).items.push(e);
        });
        groups.forEach(g => {
          const lbl = document.createElement('div');
          lbl.className = 'h-week-label';
          lbl.appendChild(document.createTextNode(g.label));
          entriesEl.appendChild(lbl);
          g.items.forEach(e => entriesEl.appendChild(buildHistoryEntryRow(e)));
        });
      } else {
        // Flat list — no week dividers when sorting by something other than date.
        sorted.forEach(e => entriesEl.appendChild(buildHistoryEntryRow(e)));
      }

      // Stats footer (always visible, computed from the unfiltered list).
      entriesEl.appendChild(buildHistoryStatsFooter(allFinalized));
    }

    refreshHistoryEntries();
  }

  function buildHistoryEntries() {
    const today = new Date();
    const todayWeekStart = getIsoWeekStart(today);
    const lastWeekStart = addDays(todayWeekStart, -7);
    const todayWeekKey = formatDateKey(todayWeekStart);
    const lastWeekKey = formatDateKey(lastWeekStart);

    const entries = [];
    state.weeklyPlan.forEach((cls, key) => {
      if (cls.status !== 'finalized') return;
      const dateStr = cls.date || '';
      const timeStr = normalizeTime(cls.time || '00:00');
      const dt = parseDateInput(dateStr);
      if (!dt) return;
      const attendeesArr = cls.attendees instanceof Set
        ? Array.from(cls.attendees)
        : Array.isArray(cls.attendees) ? cls.attendees.slice() : [];
      const wkStart = getIsoWeekStart(dt);
      const wkKey = formatDateKey(wkStart);
      let weekLabel;
      if (wkKey === todayWeekKey) weekLabel = 'This week';
      else if (wkKey === lastWeekKey) weekLabel = 'Last week';
      else {
        const wkEnd = addDays(wkStart, 6);
        const startMo = MONTH_SHORT[wkStart.getMonth()];
        const endMo = MONTH_SHORT[wkEnd.getMonth()];
        if (startMo === endMo) {
          weekLabel = `Week of ${startMo} ${wkStart.getDate()} – ${wkEnd.getDate()}`;
        } else {
          weekLabel = `Week of ${startMo} ${wkStart.getDate()} – ${endMo} ${wkEnd.getDate()}`;
        }
      }
      entries.push({
        key,
        date: dateStr,
        time: timeStr,
        dateObj: combineDateTime(dt, timeStr),
        classType: (cls.classType || '').toString().trim(),
        playlist: cls.playlist || '',
        attendeesArr,
        attendeesCount: attendeesArr.length,
        mo: MONTH_SHORT[dt.getMonth()],
        day: dt.getDate(),
        weekLabel
      });
    });
    return entries;
  }

  function combineDateTime(dateObj, timeStr) {
    const d = new Date(dateObj.getTime());
    const [h, m] = (timeStr || '00:00').split(':').map(n => parseInt(n, 10) || 0);
    d.setHours(h, m, 0, 0);
    return d;
  }

  function describeHistorySort(sort) {
    const key = sort && sort.key || 'date';
    const dir = sort && sort.dir || 'desc';
    const arrow = dir === 'asc' ? '↑' : '↓';
    if (key === 'date') return 'Date ' + arrow;
    if (key === 'type') return dir === 'asc' ? 'Type A→Z' : 'Type Z→A';
    if (key === 'playlist') return 'Playlist ' + arrow;
    if (key === 'attendees') return 'Attendees ' + arrow;
    return key + ' ' + arrow;
  }

  function sortHistoryEntries(entries, sort) {
    const key = sort && sort.key || 'date';
    const dir = sort && sort.dir || 'desc';
    const factor = dir === 'asc' ? 1 : -1;
    const out = entries.slice();
    out.sort((a, b) => {
      let cmp = 0;
      if (key === 'date') {
        cmp = a.dateObj.getTime() - b.dateObj.getTime();
      } else if (key === 'type') {
        cmp = (a.classType || '').localeCompare(b.classType || '', undefined, { sensitivity: 'base' });
      } else if (key === 'playlist') {
        cmp = comparePlaylistIds(a.playlist, b.playlist);
      } else if (key === 'attendees') {
        cmp = a.attendeesCount - b.attendeesCount;
      }
      if (cmp === 0) {
        // Tie-breaker: most recent date first regardless of dir.
        cmp = b.dateObj.getTime() - a.dateObj.getTime();
        return cmp;
      }
      return cmp * factor;
    });
    return out;
  }

  function buildHistoryEntryRow(e) {
    const row = document.createElement('div');
    row.className = 'h-entry';

    const dateBlock = document.createElement('div');
    dateBlock.className = 'h-entry__date';
    dateBlock.innerHTML = `
      <div class="h-entry__date-mo">${esc(e.mo)}</div>
      <div class="h-entry__date-d">${e.day}</div>`;
    row.appendChild(dateBlock);

    const main = document.createElement('div');
    main.className = 'h-entry__main';

    const type = document.createElement('div');
    type.className = 'h-entry__type';
    type.textContent = e.classType || 'Class';
    main.appendChild(type);

    const sub = document.createElement('div');
    sub.className = 'h-entry__sub';
    const timeText = formatTime(e.time);
    const guestCount = e.attendeesCount;
    const firstTwo = e.attendeesArr.slice(0, 2).join(', ');
    const moreCount = guestCount > 2 ? guestCount - 2 : 0;
    const namesPart = firstTwo
      ? (moreCount > 0 ? `${firstTwo} +${moreCount} more` : firstTwo)
      : '';
    const parts = [];
    if (timeText) parts.push(timeText);
    parts.push(`${guestCount} ${guestCount === 1 ? 'guest' : 'guests'}`);
    if (namesPart) parts.push(namesPart);
    sub.innerHTML = parts.map(p => `<span>${esc(p)}</span>`).join('<span class="sep"></span>');
    main.appendChild(sub);

    row.appendChild(main);

    const pl = document.createElement('div');
    pl.className = 'h-entry__pl';
    pl.textContent = e.playlist ? String(e.playlist) : '—';
    row.appendChild(pl);

    row.addEventListener('click', () => openClassEditSheet(e.key));
    return row;
  }

  function buildHistoryStatsFooter(allFinalized) {
    const total = allFinalized.length;
    const guestSet = new Set();
    const playlistSet = new Set();
    allFinalized.forEach(e => {
      e.attendeesArr.forEach(g => { if (g) guestSet.add(g); });

    });

    const card = document.createElement('div');
    card.className = 'h-stats-card';
    const grid = document.createElement('div');
    grid.className = 'h-stats-grid';
    [
      { val: total, lbl: 'Total Classes' },
      { val: guestSet.size, lbl: 'Unique Guests' },
      { val: playlistSet.size, lbl: 'Playlists Used' }
    ].forEach(s => {

        <div class="h-stat__lbl">${esc(s.lbl)}</div>`;
      grid.appendChild(cell);
    });
    card.appendChild(grid);
    return card;
  }

  // ── Guest Detail screen (pushed) ───────────────────────
  function renderGuestDetailScreen(container, params) {
    const name = (params && params.name) || '';
    if (!name || !state.allGuests.has(name)) {
      // Guest no longer exists (e.g. just deleted) — pop back.
      navPop();
      return;
    }

    // Build screen scaffold.
    const screen = document.createElement('div');
    screen.className = 'gd-screen';

    // Top nav bar.
    const navBar = document.createElement('div');
    navBar.className = 'gd-navbar';

    const back = document.createElement('button');
    back.type = 'button';
    back.className = 'gd-back';
    back.setAttribute('aria-label', 'Back');
    back.innerHTML = `${ICONS.chevR16}<span>Guests</span>`;
    back.addEventListener('click', () => navPop());
    navBar.appendChild(back);

    const title = document.createElement('div');
    title.className = 'gd-title';
    title.textContent = name;
    navBar.appendChild(title);

    const renameBtn = document.createElement('button');

    trashBtn.type = 'button';
    trashBtn.className = 'gd-icon-btn gd-icon-btn--danger';
    trashBtn.setAttribute('aria-label', 'Delete guest');
    trashBtn.innerHTML = ICONS.trash;
    trashBtn.addEventListener('click', () => openDeleteGuestSheet(name));
    actions.appendChild(trashBtn);

    navBar.appendChild(actions);
    screen.appendChild(navBar);

    // Scroll body.
    const scroller = document.createElement('div');
    scroller.className = 'hilo-scroll';
    screen.appendChild(scroller);

    // Hero card.
    const hero = document.createElement('div');
    hero.className = 'gd-hero';
    const heroAv = document.createElement('div');
    heroAv.className = 'gd-hero__av';
    heroAv.textContent = (name[0] || '?').toUpperCase();
    hero.appendChild(heroAv);
    const heroName = document.createElement('div');
    heroName.className = 'gd-hero__name';
    heroName.textContent = name;
    hero.appendChild(heroName);
    const heroSub = document.createElement('div');
    heroSub.className = 'gd-hero__sub';
    heroSub.textContent = 'Member since —';
    hero.appendChild(heroSub);
    const heroBadges = document.createElement('div');
    heroBadges.className = 'gd-hero__badges';
    const heroBadge = document.createElement('span');
    heroBadge.className = 'g-guest-card__badge';
    heroBadge.textContent = 'Active';
    heroBadges.appendChild(heroBadge);
    hero.appendChild(heroBadges);
    scroller.appendChild(hero);

    // Compute records for this guest.
    const guestRecords = state.records.filter(r => r.guest === name);

    // Sort by date desc (most recent first), then by time desc.
    const sortedRecords = guestRecords.slice().sort((a, b) => {
      const da = a.date || '';
      const db = b.date || '';
      if (da !== db) return db.localeCompare(da);
      const ta = normalizeTime(a.time || '00:00');
      const tb = normalizeTime(b.time || '00:00');
      return tb.localeCompare(ta);
    });

    const totalClasses = guestRecords.length;
    const uniquePlaylists = new Set(guestRecords.map(r => r.playlist).filter(Boolean)).size;

    // Last seen across any class — use lastHeardMap to find the max date.
    const lhm = lastHeardMap();
    const guestPlaylists = lhm.get(name);
    let lastSeenDate = '';
    if (guestPlaylists) {
      guestPlaylists.forEach(d => {
        if (!lastSeenDate || (d && d > lastSeenDate)) lastSeenDate = d;
      });
    }

    let lastSeenLabel = '—';
    if (lastSeenDate) {
      const days = daysBetween(formatDateKey(new Date()), lastSeenDate);
      if (days <= 0) lastSeenLabel = 'Today';
      else if (days === 1) lastSeenLabel = '1d';
      else lastSeenLabel = `${days}d`;
    }

    // Stats row.
    const stats = document.createElement('div');
    stats.className = 'gd-stats';
    [
      { val: String(totalClasses), lbl: 'Classes' },
      { val: String(uniquePlaylists), lbl: 'Playlists' },
      { val: lastSeenLabel, lbl: 'Last seen' }
    ].forEach(s => {
      const cell = document.createElement('div');
      cell.className = 'gd-stat';
      cell.innerHTML = `
        <div class="gd-stat__val">${esc(s.val)}</div>
        <div class="gd-stat__lbl">${esc(s.lbl)}</div>`;
      stats.appendChild(cell);
    });
    scroller.appendChild(stats);

    // Last class card — most recent record.
    if (sortedRecords.length > 0) {
      const last = sortedRecords[0];
      const lastKey = createDateTimeKey(last.date, last.time);
      const lastCls = state.weeklyPlan.get(lastKey);
      const lastClassType = lastCls && lastCls.classType ? lastCls.classType : '';

      const sectionHead = document.createElement('div');
      sectionHead.className = 'gd-section-head';
      sectionHead.textContent = 'Last Class';
      scroller.appendChild(sectionHead);

      const lastCard = document.createElement('div');
      lastCard.className = 'gd-last-card';
      const iconEl = document.createElement('div');
      iconEl.className = 'gd-last-card__icon';
      iconEl.innerHTML = ICONS.calendar;
      lastCard.appendChild(iconEl);

      const mainBlock = document.createElement('div');
      mainBlock.className = 'gd-last-card__main';
      const lblEl = document.createElement('div');
      lblEl.className = 'gd-last-card__lbl';
      lblEl.textContent = formatGuestDateShort(last.date) + (last.time ? ' · ' + formatTime(last.time) : '');
      mainBlock.appendChild(lblEl);
      const valEl = document.createElement('div');
      valEl.className = 'gd-last-card__val';
      valEl.textContent = lastClassType ? `${lastClassType} · Playlist #${last.playlist || '—'}` : `Playlist #${last.playlist || '—'}`;
      mainBlock.appendChild(valEl);
      if (lastCls && Array.isArray(lastCls.attendees)) {
        const subEl = document.createElement('div');
        subEl.className = 'gd-last-card__sub';
        const cnt = lastCls.attendees.length;
        subEl.textContent = `${cnt} ${cnt === 1 ? 'guest' : 'guests'}`;
        mainBlock.appendChild(subEl);
      }
      lastCard.appendChild(mainBlock);

      // Tap → open class edit sheet for that class (only if class still exists in weeklyPlan).
      lastCard.addEventListener('click', () => {
        if (state.weeklyPlan.has(lastKey)) {
          openClassEditSheet(lastKey);
        } else {
          showToast('That class is no longer scheduled', 'info');
        }
      });
      scroller.appendChild(lastCard);
    }

    // Playlist history section.
    const histHead = document.createElement('div');
    histHead.className = 'gd-section-head';
    histHead.textContent = 'Playlist History';
    scroller.appendChild(histHead);

    if (sortedRecords.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'gd-empty';
      empty.textContent = 'No history yet.';
      scroller.appendChild(empty);
    } else {
      // Group by playlist: count + most recent date.
      const byPlaylist = new Map();
      sortedRecords.forEach(r => {
        const pid = r.playlist || '—';
        let entry = byPlaylist.get(pid);
        if (!entry) {
          entry = { playlist: pid, count: 0, lastDate: '', lastTime: '' };
          byPlaylist.set(pid, entry);
        }
        entry.count += 1;
        // sortedRecords are already date-desc; the first one we see per pid is the most recent.
        if (!entry.lastDate) {
          entry.lastDate = r.date || '';
          entry.lastTime = r.time || '';
        }
      });
      const rows = Array.from(byPlaylist.values()).sort((a, b) => {
        // Sort by most recent last-heard date desc.
        if (a.lastDate !== b.lastDate) return (b.lastDate || '').localeCompare(a.lastDate || '');
        return comparePlaylistIds(a.playlist, b.playlist);
      });

      const list = document.createElement('div');
      list.className = 'gd-history-list';
      const todayISO = formatDateKey(new Date());
      rows.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.className = 'gd-history-row';

        const num = document.createElement('div');
        num.className = 'gd-history-row__num';
        num.textContent = row.playlist ? String(row.playlist) : '—';
        rowEl.appendChild(num);

        const m = document.createElement('div');
        m.className = 'gd-history-row__main';
        const ttl = document.createElement('div');
        ttl.className = 'gd-history-row__title';
        ttl.textContent = `Playlist #${row.playlist}`;
        m.appendChild(ttl);
        const sub = document.createElement('div');
        sub.className = 'gd-history-row__sub';
        const lastLabel = row.lastDate ? formatGuestDateShort(row.lastDate) : '—';
        sub.textContent = `Heard ${row.count} ${row.count === 1 ? 'time' : 'times'} · last ${lastLabel}`;
        m.appendChild(sub);
        rowEl.appendChild(m);

        const age = document.createElement('div');
        age.className = 'gd-history-row__age';
        if (row.lastDate) {
          const d = daysBetween(todayISO, row.lastDate);
          age.textContent = d <= 0 ? 'Today' : (d === 1 ? '1d ago' : `${d}d ago`);
        } else {
          age.textContent = '—';
        }
        rowEl.appendChild(age);

        list.appendChild(rowEl);
      });
      scroller.appendChild(list);
    }

    container.appendChild(screen);
  }

  // ── Rename Guest sheet ─────────────────────────────────
  function openRenameGuestSheet(currentName) {
    const body = document.createElement('div');

    const field = document.createElement('div');
    field.className = 'sheet-field';
    field.appendChild(sheetLabel('New name'));
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'sheet-input';
    input.value = currentName;
    input.autocomplete = 'off';
    field.appendChild(input);
    const errorEl = document.createElement('div');
    errorEl.className = 'sheet-error';
    errorEl.style.display = 'none';
    field.appendChild(errorEl);
    body.appendChild(field);

    const cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.className = 'hilo-btn hilo-btn--ghost';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', () => closeSheet());

    const saveBtn = document.createElement('button');
    saveBtn.type = 'button';
    saveBtn.className = 'hilo-btn hilo-btn--primary';
    saveBtn.innerHTML = `${ICONS.check}<span>Save</span>`;
    saveBtn.addEventListener('click', async () => {
      const fresh = (input.value || '').trim();
      if (!fresh) {
        errorEl.textContent = 'Name cannot be empty.';
        errorEl.style.display = 'block';
        return;
      }
      if (fresh === currentName) {
        closeSheet();
        return;
      }
      // Collision check (case-insensitive, but exclude self).
      const lower = fresh.toLowerCase();
      const exists = Array.from(state.allGuests).some(g =>
        g !== currentName && g.toLowerCase() === lower
      );
      if (exists) {
        errorEl.textContent = `A guest named "${fresh}" already exists.`;
        errorEl.style.display = 'block';
        return;
      }
      const ok = await renameGuest(currentName, fresh);
      if (ok) {
        // Update top of nav stack so Detail screen still resolves to a valid guest.
        const tab = state.nav.activeTab;
        const stack = state.nav.stacks[tab];
        if (stack.length > 0) {
          const top = stack[stack.length - 1];
          if (top.name === 'guestDetail') {
            top.params = { ...(top.params || {}), name: fresh };
          }
        }
        closeSheet();
        renderApp();
      }
    });

    body.appendChild(buildSheetActions([cancelBtn, saveBtn]));
    openSheet({ title: 'Rename Guest', body, height: 'short' });
    setTimeout(() => { input.focus(); input.select(); }, 250);
  }

  // ── Delete Guest confirm sheet ─────────────────────────
  function openDeleteGuestSheet(targetName) {
    const body = document.createElement('div');

    const msg = document.createElement('div');
    msg.style.cssText = 'padding:8px 4px 16px;font-size:14px;color:var(--text-secondary);line-height:1.5;';
    msg.textContent = `Delete "${targetName}"? Their history will be preserved but they won't appear in your active guest list.`;
    body.appendChild(msg);

    const cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.className = 'hilo-btn hilo-btn--ghost';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', () => closeSheet());

    const deleteBtn = document.createElement('button');
    deleteBtn.type = 'button';
    deleteBtn.className = 'hilo-btn hilo-btn--danger';
    deleteBtn.innerHTML = `${ICONS.trash}<span>Delete</span>`;
    deleteBtn.addEventListener('click', async () => {

    body.appendChild(buildSheetActions([cancelBtn, deleteBtn]));
    openSheet({ title: 'Delete Guest', body, height: 'short' });

  // ── Guest data mutations (re-introduced from Phase 1) ──
  async function renameGuest(oldName, newName) {
    const old = (oldName || '').trim();
    const fresh = (newName || '').trim();
    if (!old || !fresh || old === fresh) return false;

    // Collision check (case-insensitive, ignoring self).
    if (Array.from(state.allGuests).some(g => g !== old && g.toLowerCase() === fresh.toLowerCase())) {
      showToast(`A guest named "${fresh}" already exists`, 'error');
      return false;
    }

    try {
      // 1. Update in-memory records and remember the affected ones for Firestore.
      const updated = [];
      state.records.forEach(r => {
        if (r.guest === old) {
          const oldKey = r.recordKey || buildRecordKey(r);
          r.guest = fresh;
          r.recordKey = buildRecordKey(r);
          updated.push({ oldKey, newRec: { ...r } });
        }
      });

      // 2. Update weekly plan attendees (handles both Set and Array shapes).
      const affectedClassKeys = [];
      state.weeklyPlan.forEach((cls, key) => {
        if (cls.attendees instanceof Set) {
          if (cls.attendees.has(old)) {
            cls.attendees.delete(old);
            cls.attendees.add(fresh);
            affectedClassKeys.push(key);
          }
        } else if (Array.isArray(cls.attendees)) {
          const idx = cls.attendees.indexOf(old);
          if (idx > -1) {
            cls.attendees[idx] = fresh;
            affectedClassKeys.push(key);
          }
        }
      });

      // 3. Update active guest set.
      state.allGuests.delete(old);
      state.allGuests.add(fresh);

      // 4. Persist.
      saveStateToLocalStorage();

      if (state.firebaseUser) {
        const recordsRef = getUserCollectionRef('records');
        const classesRef = getUserCollectionRef('classes');
        const ops = [];
        updated.forEach(({ oldKey, newRec }) => {
          ops.push({ action: 'delete', ref: recordsRef.doc(safeDocId(oldKey)) });
          ops.push({ action: 'set', ref: recordsRef.doc(safeDocId(newRec.recordKey)), data: newRec });
        });
        affectedClassKeys.forEach(key => {
          const cls = state.weeklyPlan.get(key);
          if (!cls) return;
          const attArr = cls.attendees instanceof Set ? Array.from(cls.attendees) : (cls.attendees || []);
          ops.push({
            action: 'set',
            ref: classesRef.doc(safeDocId(key)),
            data: {
              date: cls.date,
              time: cls.time,
              playlist: cls.playlist || '',
              attendees: attArr,
              status: cls.status || 'draft',
              notes: cls.notes || '',
              classType: cls.classType || '',
              dateTimeKey: key
            }
          });
        });
        if (ops.length > 0) await runFirestoreBatch(ops);
      }

      showToast(`Renamed to "${fresh}"`, 'success');
      return true;
    } catch (e) {
      console.error('renameGuest failed', e);
      showToast('Rename failed: ' + (e.message || 'unknown'), 'error');
      return false;
    }
  }

  async function deleteGuest(name) {
    const target = (name || '').trim();
    if (!target) return false;

    try {
      // Remove from active guest list. PRESERVE history records so existing
      // History entries still show this guest's name in their attendee lists.
      state.allGuests.delete(target);

      // Remove from any current class attendee lists.
      const affectedClassKeys = [];
      state.weeklyPlan.forEach((cls, key) => {
        if (cls.attendees instanceof Set) {
          if (cls.attendees.has(target)) {
            cls.attendees.delete(target);
            affectedClassKeys.push(key);
          }
        } else if (Array.isArray(cls.attendees)) {
          const idx = cls.attendees.indexOf(target);
          if (idx > -1) {
            cls.attendees.splice(idx, 1);
            affectedClassKeys.push(key);
          }
        }
      });

      saveStateToLocalStorage();

      if (state.firebaseUser && affectedClassKeys.length > 0) {
        const classesRef = getUserCollectionRef('classes');
        const ops = affectedClassKeys.map(key => {
          const cls = state.weeklyPlan.get(key);
          const attArr = cls.attendees instanceof Set ? Array.from(cls.attendees) : (cls.attendees || []);
          return {
            action: 'set',
            ref: classesRef.doc(safeDocId(key)),
            data: {
              date: cls.date,
              time: cls.time,
              playlist: cls.playlist || '',
              attendees: attArr,
              status: cls.status || 'draft',
              notes: cls.notes || '',
              classType: cls.classType || '',
              dateTimeKey: key
            }
          };
        });
        await runFirestoreBatch(ops);
      }

      showToast(`Removed "${target}"`, 'success');
      renderApp();
      return true;
    } catch (e) {
      console.error('deleteGuest failed', e);
      showToast('Delete failed: ' + (e.message || 'unknown'), 'error');
      return false;
    }
  }
  // ── Recommender screen ───────────────────────────────────
  function renderRecommenderScreen(container, params) {
    const today = new Date();

    // Default replay window if missing.
    if (!Number.isFinite(state.selectedWindow)) state.selectedWindow = 45;

    // Eligible (non-finalized) classes for selection.
    let entries = getRecommenderClassEntries();

    // Reconcile state.selectedRecommendationClassKeys against valid keys —
    // mirrors getSelectedRecommenderClassEntries() but without auto-seed
    // (we want the empty-state placeholder when arriving via sparkle).
    if (entries.length === 0) {
      state.selectedRecommendationClassKeys.clear();
    } else {
      const validKeys = new Set(entries.map(e => e.key));
      for (const key of state.selectedRecommendationClassKeys) {
        if (!validKeys.has(key)) state.selectedRecommendationClassKeys.delete(key);
      }
    }

    // Build screen scaffold.
    const screen = document.createElement('div');
    screen.className = 'r-screen';

    const scroll = document.createElement('div');
    scroll.className = 'r-scroll';
    screen.appendChild(scroll);

    // Header.
    const header = document.createElement('div');
    header.className = 'r-header';

    const back = document.createElement('button');
    back.type = 'button';
    back.className = 'r-header__back';
    back.setAttribute('aria-label', 'Back');
    back.innerHTML = `${ICONS.chevR16}<span>Back</span>`;
    back.addEventListener('click', () => navPop());
    header.appendChild(back);

    const titles = document.createElement('div');
    titles.className = 'r-header__titles';
    titles.innerHTML = `
      <div class="r-header__date">RECOMMENDER</div>
      <div class="r-header__title">Recommend a playlist</div>`;
    header.appendChild(titles);

    scroll.appendChild(header);

    // Mount points for surgical re-renders.
    const classBar = document.createElement('div');
    classBar.className = 'r-class-bar';
    scroll.appendChild(classBar);

    const windowRow = document.createElement('div');
    windowRow.className = 'r-window-row';
    scroll.appendChild(windowRow);

    const bestMount = document.createElement('div');
    bestMount.id = 'r-best-mount';
    scroll.appendChild(bestMount);

    const attendeesMount = document.createElement('div');
    attendeesMount.id = 'r-attendees-mount';
    scroll.appendChild(attendeesMount);

    const rankMount = document.createElement('div');
    rankMount.id = 'r-rank-mount';
    scroll.appendChild(rankMount);

    // Sticky action bar.
    const actionBar = document.createElement('div');
    actionBar.className = 'r-action-bar';
    actionBar.id = 'r-action-mount';
    screen.appendChild(actionBar);

    container.appendChild(screen);

    // Render the dynamic sections.
    function recomputeAndRender() {
      // Refresh entries each pass — they may have changed if the user
      // tapped Select-All-Drafts after a Firestore listener tick.
      entries = getRecommenderClassEntries();
      const validKeys = new Set(entries.map(e => e.key));
      for (const key of state.selectedRecommendationClassKeys) {
        if (!validKeys.has(key)) state.selectedRecommendationClassKeys.delete(key);
      }
      const selectedEntries = entries.filter(e => state.selectedRecommendationClassKeys.has(e.key));

      renderClassBar(classBar, entries, selectedEntries, recomputeAndRender);
      renderWindowRow(windowRow, recomputeAndRender);

      const metrics = getMetricsForSelectedClasses(selectedEntries);
      const mergedAttendees = mergedAttendeesFor(selectedEntries);

      renderBestCard(bestMount, selectedEntries, metrics, mergedAttendees);
      renderAttendeesSection(attendeesMount, selectedEntries, metrics, mergedAttendees);
      renderRankList(rankMount, selectedEntries, metrics, recomputeAndRender);
      renderActionBar(actionBar, selectedEntries, metrics, recomputeAndRender);
    }

    recomputeAndRender();
  }

  function mergedAttendeesFor(selectedEntries) {
    const merged = new Set();
    selectedEntries.forEach(({ cls }) => {
      const att = cls.attendees instanceof Set ? cls.attendees : new Set(cls.attendees || []);
      att.forEach(g => merged.add(g));
    });
    return merged;
  }

  function classPillLabel(entry) {
    const d = parseDateInput(entry.cls.date);

      if (formatDateKey(d) === todayISO) dayPart = 'Today';
      else dayPart = DAY_SHORT[d.getDay()];
    }
    const time = timeShortLabel(entry.cls.time);
    return { dayPart, time };

        ? `<span class="r-class-pill__status">${esc(status)}</span>`

    node.appendChild(pills);

    // Merged badge — show when ≥2 selected entries share type+date.
    const mergedHint = computeMergedHint(selectedEntries);
    if (mergedHint) {
      const badge = document.createElement('div');
      badge.className = 'r-merged-badge';
      badge.innerHTML = `${ICONS.sparkle}<span>Merged: ${mergedHint.count} ${esc(mergedHint.type)} classes (${esc(mergedHint.dayLabel)})</span>`;
      node.appendChild(badge);
    }
  }

  function computeMergedHint(selectedEntries) {
    if (selectedEntries.length < 2) return null;
    // Group by type|date.
    const groups = new Map();
    selectedEntries.forEach(e => {
      const t = (e.cls.classType || '').toLowerCase();
      if (!t) return;
      const key = `${t}|${e.cls.date}`;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(e);
    });
    let best = null;
    groups.forEach(arr => {
      if (arr.length < 2) return;
      if (!best || arr.length > best.length) best = arr;
    });
    if (!best) return null;
    const sample = best[0];
    const d = parseDateInput(sample.cls.date);
    let dayLabel = sample.cls.date || '';
    if (d) {
      const todayISO = formatDateKey(new Date());
      dayLabel = formatDateKey(d) === todayISO ? 'Today' : DAY_SHORT[d.getDay()];
    }
    return { count: best.length, type: sample.cls.classType, dayLabel };
  }

  function buildBestReasons(best, mergedAttendees, strength) {
    const out = [];
    const w = state.selectedWindow || 45;
    if (best.duePct >= 50) {
      out.push({ text: `Most attendees haven't heard #${best.playlist} in ${w}+ days.`, tone: '' });
    } else if (best.duePct > 0) {
      out.push({ text: `${best.duePct}% are due for #${best.playlist} (${w}+ days).`, tone: '' });
    }
    if (best.neverPct > 0) {
      out.push({ text: `${best.neverPct}% never heard this playlist.`, tone: '' });
    }
    if (best.recentPct > 0) {
      out.push({
        text: `${best.recentPct}% heard recently — give them a break.`,
        tone: ''
      });
    } else if (mergedAttendees.size > 0) {
      out.push({ text: `Nobody heard this in the last ${w} days.`, tone: '' });
    }
    if (strength) {
      const toneMap = { strong: 'strong', moderate: 'moderate', close: 'close' };
      out.push({
        text: `Strength: ${strength.label}. ${strength.detail || ''}`.trim(),
        tone: toneMap[strength.tone] || ''
      });
    }
    return out;
  }

  function renderAttendeesSection(node, selectedEntries, metrics, mergedAttendees) {
    node.innerHTML = '';
    if (mergedAttendees.size === 0 || metrics.length === 0) return;

    const best = metrics[0];
    const refISO = (selectedEntries[0] && selectedEntries[0].cls.date) || formatDateKey(new Date());

    const sec = document.createElement('div');
    sec.className = 'r-attendees-section';

    const isOpen = !!state.recAttendeesOpen;
    const toggle = document.createElement('button');
    toggle.type = 'button';
    toggle.className = 'r-attendees-toggle' + (isOpen ? ' r-attendees-toggle--open' : '');
    toggle.innerHTML = `
      <span class="r-attendees-toggle__title">All attendees (${mergedAttendees.size})</span>
      <span class="r-attendees-toggle__chev">${ICONS.chevR16}</span>`;
    toggle.addEventListener('click', () => {
      state.recAttendeesOpen = !state.recAttendeesOpen;
      renderAttendeesSection(node, selectedEntries, metrics, mergedAttendees);
    });
    sec.appendChild(toggle);

    if (isOpen) {
      const list = document.createElement('div');
      list.className = 'r-attendees-list';
      const lm = lastHeardMap(refISO);
      const guests = Array.from(mergedAttendees).map(g => {
        const last = lm.get(g)?.get(best.playlist);
        let days = null;
        if (last) {
          const d = daysBetween(refISO, last);
          if (d >= 0) days = d;
        }
        return { guest: g, days };
      });
      guests.sort((a, b) => {
        if (a.days === null && b.days !== null) return -1;
        if (a.days !== null && b.days === null) return 1;
        if (a.days === null && b.days === null) return a.guest.localeCompare(b.guest);
        return b.days - a.days;
      });
      guests.forEach(({ guest, days }) => {
        const row = document.createElement('div');
        row.className = 'r-attendee-row';
        const initials = guest
          .trim()
          .split(/\s+/)
          .map(p => (p[0] || '').toUpperCase())
          .slice(0, 2)
          .join('') || '?';
        const lastTxt = days === null
          ? `Never heard #${best.playlist}`
          : (days === 0 ? `Last heard #${best.playlist}: today` : `Last heard #${best.playlist}: ${days}d ago`);
        const lastClass = days === null ? ' r-attendee-row__last--never' : '';
        row.innerHTML = `
          <div class="r-attendee-row__avatar">${esc(initials)}</div>
          <div class="r-attendee-row__name">${esc(guest)}</div>
          <div class="r-attendee-row__last${lastClass}">${esc(lastTxt)}</div>`;
        list.appendChild(row);
      });
      sec.appendChild(list);
    }

    node.appendChild(sec);
  }

    node.style.display = '';

    const inner = document.createElement('div');
    inner.className = 'r-action-bar__inner';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'r-action-btn';

    const best = metrics[0];
    if (!best) {
      btn.setAttribute('disabled', 'disabled');
      btn.textContent = 'No recommendation available';
    } else if (selectedEntries.length === 1) {
      const e = selectedEntries[0];
      const typeLabel = e.cls.classType || 'class';
      const timeLabel = timeShortLabel(e.cls.time) || '';
      btn.innerHTML = `${ICONS.check}<span>Assign #${best.playlist} to ${esc(typeLabel)}${timeLabel ? ' ' + esc(timeLabel) : ''}</span>`;
    } else {
      btn.innerHTML = `${ICONS.check}<span>Assign #${best.playlist} to all ${selectedEntries.length} classes</span>`;
    }
    btn.addEventListener('click', () => {
      if (!best) return;
      assignPlaylistToSelected(String(best.playlist), selectedEntries, onChange);
    });

    inner.appendChild(btn);
    node.appendChild(inner);
  }

  async function assignPlaylistToSelected(playlistId, selectedEntries, onChange) {
    if (!selectedEntries || selectedEntries.length === 0) return;
    let savedAny = false;
    for (const entry of selectedEntries) {
      const cls = entry.cls;
      const rosterSet = cls.attendees instanceof Set ? cls.attendees : new Set(cls.attendees || []);
      // Mirror locally first so empty-Firebase users still see the change.
      cls.playlist = playlistId;
      state.weeklyPlan.set(entry.key, cls);
      if (state.firebaseUser) {
        try {
          const ok = await saveClassToFirestore(entry.key, {
            date: cls.date,
            time: cls.time,
            playlist: playlistId,
            attendees: rosterSet,
            status: cls.status || 'draft',
            notes: cls.notes || '',
            classType: cls.classType || ''
          });
          if (ok) savedAny = true;
        } catch (e) {
          console.warn('Recommender assign failed:', e);
        }
      } else {
        savedAny = true;
      }
    }
    try { saveStateToLocalStorage(); } catch (e) { /* noop */ }

    if (savedAny) {
      if (selectedEntries.length === 1) {
        const e = selectedEntries[0];
        const typeLabel = e.cls.classType || 'class';
        const timeLabel = timeShortLabel(e.cls.time) || '';
        showToast(`Assigned #${playlistId} to ${typeLabel}${timeLabel ? ' ' + timeLabel : ''}`, 'success');
      } else {
        showToast(`Assigned #${playlistId} to ${selectedEntries.length} classes`, 'success');
      }
    }

    // Clear selection per task requirements + return to Schedule.
    state.selectedRecommendationClassKeys.clear();
    state.recAutoSelectDone = true;
    state.recAttendeesOpen = false;

    // Pop the recommender screen and switch to Schedule tab.
    const tab = state.nav.activeTab;
    state.nav.stacks[tab] = [];
    navSwitch('schedule');
  }
  function renderPlaylistsScreen(container, params) {
    container.innerHTML = '<div style="padding:24px;font-family:Outfit;font-size:24px">Playlists (placeholder)</div>';
  }
  function renderSettingsScreen(container, params) {
    container.innerHTML = '<div style="padding:24px;font-family:Outfit;font-size:24px">Settings (placeholder)</div>';
  }

  // Map of screen.name -> renderer.
  const SCREEN_RENDERERS = {
    schedule: renderScheduleScreen,
    guests: renderGuestsScreen,
    history: renderHistoryScreen,
    more: renderMoreScreen,
    guestDetail: renderGuestDetailScreen,
    recommender: renderRecommenderScreen,
    playlists: renderPlaylistsScreen,
    settings: renderSettingsScreen
  };

  function renderApp() {
    const container = document.getElementById('screen-container');
    if (!container) return;
    container.innerHTML = '';
    const screen = currentScreen();
    const renderer = SCREEN_RENDERERS[screen.name] || renderScheduleScreen;
    renderer(container, screen.params || {});
    renderTabBar();
  }

  // ── Toast + spinner (ported from existing index.html) ───
  function showToast(message, type = 'info', duration = 3000) {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);

    const removeToast = () => {
      toast.style.animation = 'slideOutRight 0.3s ease forwards';
      toast.addEventListener('animationend', () => toast.remove());
      setTimeout(() => { if (toast.parentNode) toast.remove(); }, 500);
    };
    const timer = setTimeout(removeToast, duration);
    toast.addEventListener('click', () => {
      clearTimeout(timer);
      removeToast();
    });
  }

  function setLoading(button, isLoading) {
    if (!button) return;
    if (isLoading) {
      button.disabled = true;
      button.dataset.originalContent = button.innerHTML;
      button.innerHTML = '<div class="loading-spinner"></div>';
    } else {
      button.disabled = false;
      if (button.dataset.originalContent) {
        button.innerHTML = button.dataset.originalContent;
      }
    }
  }

  // ============= STARTUP =============
  document.addEventListener('DOMContentLoaded', () => {
    // 1. Hydrate from localStorage so the app is usable immediately
    //    (signed-out users keep their cached data).
    loadStateFromLocalStorage();

    // 2. Restore sign-in banner dismissal.
    state.signinBannerDismissed = localStorage.getItem('hilo:signin-banner-dismissed') === 'true';

    // 3. Compute the current week start (used by Schedule render).
    state.currentWeekStart = getWeekStart(new Date());

    // 4. Attach auth listener BEFORE any render that depends on auth state
    //    so iOS PWA redirect-flow completes correctly.
    setupAuthListener();

    // 5. Initial render. Firestore listeners (started inside the auth handler
    //    when a user is present) will trigger re-renders as data arrives.
    renderApp();

    // 6. Register service worker.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        debugLog('Service worker registered:', reg.scope);
      }).catch(err => {
        console.log('Service worker registration failed:', err);
      });
    }
  });
  </script>
</body>
