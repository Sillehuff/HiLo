    // Persisted to localStorage key 'hilo:signin-banner-dismissed'.
    signinBannerDismissed: false,
    // ── Phase 3: bottom sheet stack ─────────────────────
    // Each entry: { id, root, overlay, sheet, onClose, popstateMarker }
    sheetStack: []
  };

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => Array.from(document.querySelectorAll(sel));

  // ============= BLOCK 3: UTILITY & DATA HELPERS =============
  // (verbatim from existing index.html)

  function normalizePlaylistId(value) {
    if (value === null || value === undefined) return '';
    let raw = typeof value === 'number'
      ? (Number.isFinite(value) ? String(value) : '')
      : String(value).trim();
    if (!raw) return '';
    raw = raw.replace(/^playlist\s*#?/i, '').trim();
    if (!raw) return '';
    if (!/^\d+(\.\d+)?$/.test(raw)) return '';
    if (raw.includes('.')) {
      raw = raw.replace(/(\.\d*?[1-9])0+$/, '$1').replace(/\.0+$/, '').replace(/\.$/, '');
    }
    return raw;
  }

  function comparePlaylistIds(a, b) {
    const aId = normalizePlaylistId(a);
    const bId = normalizePlaylistId(b);
    const aNum = aId && /^\d+(\.\d+)?$/.test(aId) ? Number(aId) : NaN;
    const bNum = bId && /^\d+(\.\d+)?$/.test(bId) ? Number(bId) : NaN;
    if (!Number.isNaN(aNum) && !Number.isNaN(bNum) && aNum !== bNum) return aNum - bNum;
    if (!Number.isNaN(aNum) && Number.isNaN(bNum)) return -1;
    if (Number.isNaN(aNum) && !Number.isNaN(bNum)) return 1;
    return aId.localeCompare(bId, undefined, { numeric: true, sensitivity: 'base' });
  }

  function normalizePlaylistStatus(value) {
    const raw = (value ?? '').toString().trim();
    if (!raw) return '';
    const lower = raw.toLowerCase();
    if (lower === 'active') return 'Active';
    if (lower === 'retired') return 'Retired';
    if (lower === 'removed') return 'Removed';
    return raw;
  }

  function ensurePlaylistInState(playlistId) {
    const normalized = normalizePlaylistId(playlistId);
    if (!normalized) return;
    if (!state.playlists.includes(normalized)) {
      state.playlists.push(normalized);
      state.playlists.sort(comparePlaylistIds);
    }
  }

  function rebuildPlaylistsFromData() {
    const found = new Set();
    const removed = new Set();
    state.playlistStatus.forEach((status, playlistId) => {
      const normalized = normalizePlaylistId(playlistId);
      if (!normalized) return;
      if (normalizePlaylistStatus(status) === 'Removed') {
        removed.add(normalized);
      }
    });
    const addIfVisible = (playlistId) => {
      const normalized = normalizePlaylistId(playlistId);
      if (!normalized || removed.has(normalized)) return;
      found.add(normalized);
    };
    state.records.forEach(r => {
      addIfVisible(r.playlist);
    });
    state.weeklyPlan.forEach(cls => {
      addIfVisible(cls.playlist);
    });
    state.playlistTags.forEach((_, playlistId) => {
      addIfVisible(playlistId);
    });
    state.playlistStatus.forEach((status, playlistId) => {
      const normalized = normalizePlaylistId(playlistId);
      if (!normalized) return;
      if (normalizePlaylistStatus(status) === 'Removed') return;
      found.add(normalized);
    });
    const fallbackPlaylists = [...DEFAULT_PLAYLISTS].filter(playlistId => !removed.has(playlistId));
    state.playlists = (found.size > 0 ? Array.from(found) : fallbackPlaylists).sort(comparePlaylistIds);
  }

  // HTML escape for safe innerHTML interpolation
  function esc(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function getAllClassTypes() {
    const types = new Set(PREDEFINED_CLASS_TYPES);
    state.playlistTags.forEach(tags => tags.forEach(t => types.add(t)));
    state.records.forEach(r => { if (r.classType) types.add(r.classType); });
    state.weeklyPlan.forEach(cls => { if (cls.classType) types.add(cls.classType); });
    return Array.from(types).sort();
  }

  function normalizeTime(timeStr, fallback = '09:00') {
    const raw = (timeStr ?? '').toString().trim();
    if (!raw) return fallback;
    const cleaned = raw.replace(/^\d{4}-\d{2}-\d{2}[T\s]+/, '').trim();
    const match = cleaned.match(/^(\d{1,2})(?::(\d{1,2}))?(?::\d{1,2})?\s*([AaPp][Mm])?$/);
    if (!match) return fallback;
    let hours = Number.parseInt(match[1], 10);
    const minutes = Number.parseInt(match[2] ?? '0', 10);
    if (Number.isNaN(hours) || Number.isNaN(minutes)) return fallback;
    const meridiem = (match[3] || '').toUpperCase();
    if (meridiem === 'PM' && hours < 12) hours += 12;
    if (meridiem === 'AM' && hours === 12) hours = 0;
    return `${String(Math.max(0, Math.min(23, hours))).padStart(2, '0')}:${String(Math.max(0, Math.min(59, minutes))).padStart(2, '0')}`;
  }

  function snapToNearest15(timeStr) {
    const normalized = normalizeTime(timeStr);
    const [h, m] = normalized.split(':').map(Number);
    const snapped = Math.round(m / 15) * 15;
    const finalM = snapped === 60 ? 0 : snapped;
    const finalH = snapped === 60 ? Math.min(h + 1, 22) : h;
    return `${String(finalH).padStart(2, '0')}:${String(finalM).padStart(2, '0')}`;
  }

  function normalizeClassNumber(value) {
    return (value || '').toString().trim().replace(/\s+/g, ' ');
  }

  function parseImportedPlaylist(rawValue) {
    const raw = (rawValue || '').toString().trim();
    if (!raw) return { playlistId: '', inferredStatus: '' };
    const direct = normalizePlaylistId(raw);
    const inferredStatus = /\bretired\b/i.test(raw) ? 'Retired' : '';
    if (direct) return { playlistId: direct, inferredStatus };
    const match = raw.match(/\d+(\.\d+)?/);
    if (!match) return { playlistId: '', inferredStatus };
    return { playlistId: normalizePlaylistId(match[0]), inferredStatus };
  }

  function buildRecordKey(record) {
    const classNumber = normalizeClassNumber(record.classNumber);
    const base = `${record.date}|${normalizeTime(record.time)}|${(record.guest || '').trim()}|${record.playlist}`;
    return classNumber ? `${base}|${classNumber}` : base;
  }

  function normalizeRecord(record) {
    if (!record) return null;
    const guest = (record.guest || '').toString().trim();
    const playlist = normalizePlaylistId(record.playlist);
    if (!guest || !playlist) return null;
    let date = '';
    if (typeof record.date === 'string') {
      const rawDate = record.date.trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(rawDate)) {
        date = rawDate;
      } else if (/^\d{4}-\d{2}-\d{2}T/.test(rawDate)) {
        date = rawDate.slice(0, 10);
      } else {
        const parsedDate = new Date(rawDate);
        if (!Number.isNaN(parsedDate.getTime())) {
          date = formatDateKey(parsedDate);
        }
      }
    } else {
      const parsedDate = new Date(record.date);
      if (!Number.isNaN(parsedDate.getTime())) {
        date = formatDateKey(parsedDate);
      }
    }
    if (!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) return null;
    return {
      date,
      time: normalizeTime(record.time),
      guest,
      playlist,
      classType: (record.classType || '').toString().trim(),
      classNumber: normalizeClassNumber(record.classNumber || record.classNum)
    };
  }

  function addRecordIfNew(record) {
    const normalizedRecord = normalizeRecord(record);
    if (!normalizedRecord) return false;
    const key = buildRecordKey(normalizedRecord);
    const exists = state.records.some(r => buildRecordKey(r) === key);
    if (!exists) {
      state.records.push(normalizedRecord);
      ensurePlaylistInState(normalizedRecord.playlist);
      return true;
    }
    return false;
  }

  // FNV-1a hash for deterministic doc ids
  function safeDocId(recordKey) {
    let hash = 0x811c9dc5;
    for (let i = 0; i < recordKey.length; i++) {
      hash ^= recordKey.charCodeAt(i);
      hash = Math.imul(hash, 0x01000193);
    }
    const prefix = recordKey.slice(0, 40).replace(/[^a-zA-Z0-9_-]/g, '_');
    return prefix + '__' + (hash >>> 0).toString(36);
  }

  // Date / time formatters
  const parseDateInput = (d) => {
    if (!d) return null;
    if (typeof d === 'number' || (typeof d === 'string' && /^\d+(\.\d+)?$/.test(d.trim()))) {
      const serial = Number(d);
      if (Number.isFinite(serial) && serial > 59) {
        const wholeDays = Math.trunc(serial);
        const dayFraction = serial - wholeDays;
        const utcMs = Date.UTC(1899, 11, 30) + (wholeDays * 86400 * 1000) + Math.round(dayFraction * 86400 * 1000);
        const excelDate = new Date(utcMs);
        if (!Number.isNaN(excelDate.getTime())) {
          return new Date(
            excelDate.getUTCFullYear(),
            excelDate.getUTCMonth(),
            excelDate.getUTCDate(),
            excelDate.getUTCHours(),
            excelDate.getUTCMinutes(),
            excelDate.getUTCSeconds(),
            excelDate.getUTCMilliseconds()
          );
        }
      }
    }
    const parsed = (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d))
      ? new Date(d + 'T00:00:00')
      : new Date(d);
    return Number.isNaN(parsed.getTime()) ? null : parsed;
  };

  const formatDate = (d) => {
    if (!d) return '';
    const date = parseDateInput(d);
    if (!date) return '';
    return date.toLocaleDateString('en-US', {
      weekday: 'short',
      year: 'numeric',
      month: 'short',
      day: 'numeric'
    });
  };

  const formatTime = (timeStr) => {
    if (!timeStr) return '';
    const [hours, minutes] = timeStr.split(':');
    const hour = parseInt(hours, 10);
    const ampm = hour >= 12 ? 'PM' : 'AM';
    const displayHour = hour % 12 || 12;
    return `${displayHour}:${String(minutes).padStart(2, '0')} ${ampm}`;
  };

  const formatDateTime = (date, time) => {
    return `${formatDate(date)} at ${formatTime(time)}`;
  };

  const createDateTimeKey = (date, time) => {
    return `${date}T${normalizeTime(time)}`;
  };

  const parseDateTimeKey = (key) => {
    const [date, time] = key.split('T');
    return { date, time: normalizeTime(time) };
  };

  const daysBetween = (referenceDate, comparedDate) => {
    const date1 = parseDateInput(referenceDate);
    const date2 = parseDateInput(comparedDate);
    if (!date1 || !date2) return 0;
    const diffTime = date1.getTime() - date2.getTime();
    return Math.floor(diffTime / (1000 * 60 * 60 * 24));
  };

  const median = (arr) => {
    if (!arr.length) return 0;
    const sorted = [...arr].sort((a, b) => a - b);
    const mid = Math.floor(sorted.length / 2);
    return sorted.length % 2 ? sorted[mid] : Math.round((sorted[mid - 1] + sorted[mid]) / 2);
  };

  const getWeekStart = (date) => {
    const d = parseDateInput(date) || new Date();
    d.setHours(0, 0, 0, 0);
    const day = d.getDay();
    const diff = d.getDate() - day; // Sunday = 0
    return new Date(d.setDate(diff));
  };

  const getWeekDays = (weekStart) => {
    const days = [];
    for (let i = 0; i < 7; i++) {
      const day = new Date(weekStart);
      day.setDate(weekStart.getDate() + i);
      days.push(day);
    }
    return days;
  };

  const formatDateKey = (date) => {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  };

  function getMonthGrid(year, month) {
    const firstOfMonth = new Date(year, month, 1);
    const lastOfMonth = new Date(year, month + 1, 0);
    const startDow = firstOfMonth.getDay();
    const gridStart = new Date(year, month, 1 - startDow);
    const daysInMonth = lastOfMonth.getDate();
    const totalCells = startDow + daysInMonth;
    const numWeeks = Math.ceil(totalCells / 7);
    const gridSize = numWeeks * 7;
    const cells = [];
    for (let i = 0; i < gridSize; i++) {
      const d = new Date(gridStart);
      d.setDate(gridStart.getDate() + i);
      cells.push(d);
    }
    return cells;
  }

  // CSV helpers
  function exportToCsv() {
    if (state.records.length === 0) {
      showToast('No data to export.', 'info');
      return;
    }
    const headers = ['Date', 'Time', 'Guest', 'Playlist', 'Class Type', 'Class Number'];
    const csvRows = [headers.join(',')];
    state.records.forEach(r => {
      csvRows.push([
        r.date,
        r.time,
        `"${r.guest.replace(/"/g, '""')}"`,
        r.playlist,
        `"${(r.classType || '').replace(/"/g, '""')}"`,
        `"${(r.classNumber || '').replace(/"/g, '""')}"`
      ].join(','));
    });
    const csvString = csvRows.join('\r\n');
    const blob = new Blob([csvString], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `hilo_playlist_export_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV export complete.', 'success');
  }

  function parseCsvRow(row) {
    const fields = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < row.length; i++) {
      const ch = row[i];
      if (inQuotes) {
        if (ch === '"' && row[i + 1] === '"') {
          current += '"';
          i++;
        } else if (ch === '"') {
          inQuotes = false;
        } else {
          current += ch;
        }
      } else {
        if (ch === '"') {
          inQuotes = true;
        } else if (ch === ',') {
          fields.push(current);
          current = '';
        } else {
          current += ch;
        }
      }
    }
    fields.push(current);
    return fields;
  }

  function parseCsvText(text) {
    const rows = [];
    let currentRow = [];
    let currentField = '';
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (inQuotes) {
        if (ch === '"' && text[i + 1] === '"') {
          currentField += '"';
          i++;
        } else if (ch === '"') {
          inQuotes = false;
        } else {
          currentField += ch;
        }
        continue;
      }
      if (ch === '"') {
        inQuotes = true;
      } else if (ch === ',') {
        currentRow.push(currentField);
        currentField = '';
      } else if (ch === '\n') {
        currentRow.push(currentField);
        currentField = '';
        if (currentRow.some(col => (col || '').trim().length > 0)) {
          rows.push(currentRow);
        }
        currentRow = [];
      } else if (ch === '\r') {
        if (text[i + 1] !== '\n') {
          currentRow.push(currentField);
          currentField = '';
          if (currentRow.some(col => (col || '').trim().length > 0)) {
            rows.push(currentRow);
          }
          currentRow = [];
        }
      } else {
        currentField += ch;
      }
    }

    if (currentField.length > 0 || currentRow.length > 0) {
      currentRow.push(currentField);
      if (currentRow.some(col => (col || '').trim().length > 0)) {
        rows.push(currentRow);
      }
    }
    return rows;
  }

  function normalizeCsvHeader(header) {
    return (header || '').toString().trim().toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
  }

  function buildCsvHeaderLookup(headers) {
    const map = new Map();
    headers.forEach((header, index) => {
      const normalized = normalizeCsvHeader(header);
      if (normalized && !map.has(normalized)) map.set(normalized, index);
    });
    return map;
  }

  function getCsvValue(cols, headerLookup, aliases, fallbackIndex = -1) {
    for (const alias of aliases) {
      const idx = headerLookup.get(alias);
      if (idx !== undefined && idx < cols.length) return (cols[idx] || '').trim();
    }
    if (fallbackIndex >= 0 && fallbackIndex < cols.length) return (cols[fallbackIndex] || '').trim();
    return '';
  }

  function normalizeImportedDate(rawDate) {
    const parsed = parseDateInput((rawDate || '').toString().trim());
    return parsed ? formatDateKey(parsed) : '';
  }

  function handleCsvImport(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function(e) {
      const text = (e.target.result || '').toString();
      const rows = parseCsvText(text);
      if (rows.length === 0) {
        showToast('CSV appears empty.', 'error');
        return;
      }

      const headerCols = rows[0];
      const headerLookup = buildCsvHeaderLookup(headerCols);
      const knownHeaders = new Set([
        'date', 'time', 'guest', 'playlist',
        'date of class', 'class time', 'guest name', 'playlist number', 'class type',
        'class level', 'level', 'status', 'playlist status',
        'class number', 'class id', 'class', 'class no'
      ]);
      const hasKnownHeaders = headerCols.some(h => knownHeaders.has(normalizeCsvHeader(h)));
      const dataRows = hasKnownHeaders ? rows.slice(1) : rows;

      let importedCount = 0;
      const importedRecords = [];
      const taggedPlaylists = new Set();
      const statusPlaylists = new Set();
      dataRows.forEach(cols => {
        if (!Array.isArray(cols) || cols.every(col => !(col || '').trim())) return;
        const rawPlaylistValue = getCsvValue(cols, headerLookup, ['playlist', 'playlist number', 'playlist id'], 3);
        const parsedPlaylist = parseImportedPlaylist(rawPlaylistValue);
        const playlistId = parsedPlaylist.playlistId;
        const explicitStatus = normalizePlaylistStatus(getCsvValue(cols, headerLookup, ['status', 'playlist status']));
        const playlistStatus = explicitStatus || parsedPlaylist.inferredStatus;
        if (playlistId && playlistStatus) {
          if (state.playlistStatus.get(playlistId) !== playlistStatus) {
            state.playlistStatus.set(playlistId, playlistStatus);
          }
          statusPlaylists.add(playlistId);
          ensurePlaylistInState(playlistId);
        }
        const date = normalizeImportedDate(getCsvValue(cols, headerLookup, ['date', 'date of class', 'class date'], 0));
        const time = normalizeTime(getCsvValue(cols, headerLookup, ['time', 'class time'], 1), '09:00');
        const guest = getCsvValue(cols, headerLookup, ['guest', 'guest name', 'name'], 2);
        const classType = getCsvValue(cols, headerLookup, ['class type', 'type', 'class level', 'level'], 4).replace(/\s+/g, ' ').trim();
        const classNumber = normalizeClassNumber(getCsvValue(cols, headerLookup, ['class number', 'class id', 'class no', 'class'], -1));
        const normalized = normalizeRecord({ date, time, guest, playlist: playlistId, classType, classNumber });
        if (!normalized) return;
        if (addRecordIfNew(normalized)) {
          importedCount++;
          importedRecords.push(normalized);
        }
        state.allGuests.add(normalized.guest);
        if (classType) {
          const existingTags = state.playlistTags.get(normalized.playlist) || [];
          if (!existingTags.includes(classType)) {
            state.playlistTags.set(normalized.playlist, [...existingTags, classType]);
            taggedPlaylists.add(normalized.playlist);
          }
        }
      });
      rebuildPlaylistsFromData();
      saveStateToLocalStorage();

      const details = [];
      if (taggedPlaylists.size > 0) details.push(`${taggedPlaylists.size} class-type tag set${taggedPlaylists.size !== 1 ? 's' : ''}`);
      if (statusPlaylists.size > 0) details.push(`${statusPlaylists.size} playlist status${statusPlaylists.size !== 1 ? 'es' : ''}`);

      if (state.firebaseUser && (importedRecords.length > 0 || taggedPlaylists.size > 0 || statusPlaylists.size > 0)) {
        try {
          if (importedRecords.length > 0) {
            const recordsRef = getUserCollectionRef('records');
            const ops = importedRecords.map(r => {
              const key = buildRecordKey(r);
              return { action: 'set', ref: recordsRef.doc(safeDocId(key)), data: { ...r, recordKey: key } };
            });
            await runFirestoreBatch(ops);
          }
          const playlistsRef = getUserCollectionRef('playlists');
          const playlistDocUpdates = new Set([...taggedPlaylists, ...statusPlaylists]);
          for (const playlistId of playlistDocUpdates) {
            const payload = {};
            if (taggedPlaylists.has(playlistId)) payload.classTypes = state.playlistTags.get(playlistId) || [];
            if (statusPlaylists.has(playlistId)) payload.status = state.playlistStatus.get(playlistId) || '';
            if (Object.keys(payload).length === 0) continue;
            await playlistsRef.doc(playlistId).set(payload, { merge: true });
          }
          const detailMsg = details.length > 0 ? ` and synced ${details.join(' and ')}` : '';
          showToast(`Imported ${importedCount} records${detailMsg} to Firebase`, 'success');
        } catch (err) {
          showToast(`Imported locally but Firebase sync failed: ${err.message}`, 'error');
        }
      } else {
        const detailMsg = details.length > 0 ? ` and ${details.join(' and ')}` : '';
        showToast(`Imported ${importedCount} records${detailMsg}.`, 'success');
      }
      renderApp();
    };
    reader.readAsText(file);
    $('#fileInput').value = '';
  }

  // ── localStorage persistence ────────────────────────────
  function saveStateToLocalStorage() {
    try {
      const weeklyPlanSerialized = Array.from(state.weeklyPlan.entries()).map(([key, cls]) => [
        key,
        { ...cls, attendees: Array.from(cls.attendees || []) }
      ]);
      const dataToSave = {
        records: state.records,
        weeklyPlan: weeklyPlanSerialized,
        allGuests: Array.from(state.allGuests),
        playlistTags: Array.from(state.playlistTags.entries()),
        playlistStatus: Array.from(state.playlistStatus.entries())
      };
      localStorage.setItem('hiloPlaylistData', JSON.stringify(dataToSave));
      debugLog('State saved to localStorage');
    } catch (e) {
      console.error("Failed to save state to localStorage", e);
    }
  }

  function loadStateFromLocalStorage() {
    try {
      const savedData = localStorage.getItem('hiloPlaylistData');
      if (savedData) {
        const parsedData = JSON.parse(savedData);
        state.records = [];
        (parsedData.records || []).forEach(r => addRecordIfNew(r));
        const normalizedWeeklyPlan = new Map();
        new Map(parsedData.weeklyPlan || []).forEach((cls, key) => {
          const parsedKey = parseDateTimeKey(key);
          cls.date = cls.date || parsedKey.date;
          cls.time = normalizeTime(cls.time || parsedKey.time || '09:00');
          cls.playlist = normalizePlaylistId(cls.playlist);
          cls.id = cls.id || `${Date.now()}_${Math.random().toString(36).slice(2, 11)}`;
          if (Array.isArray(cls.attendees)) {
            cls.attendees = new Set(cls.attendees);
          } else if (!(cls.attendees instanceof Set)) {
            cls.attendees = new Set();
          }
          const normalizedKey = createDateTimeKey(cls.date, cls.time);
          if (!normalizedWeeklyPlan.has(normalizedKey)) {
            normalizedWeeklyPlan.set(normalizedKey, cls);
          }
        });
        state.weeklyPlan = normalizedWeeklyPlan;
        state.playlistTags = new Map();
        (parsedData.playlistTags || []).forEach(entry => {
          const [playlistId, tags] = entry;
          const normalizedId = normalizePlaylistId(playlistId);
          if (!normalizedId || !Array.isArray(tags)) return;
          const cleanedTags = tags.map(t => (t ?? '').toString().trim()).filter(Boolean);
          if (cleanedTags.length > 0) state.playlistTags.set(normalizedId, Array.from(new Set(cleanedTags)));
        });
        state.playlistStatus = new Map();
        (parsedData.playlistStatus || []).forEach(entry => {
          const [playlistId, status] = entry;
          const normalizedId = normalizePlaylistId(playlistId);
          const normalizedStatus = normalizePlaylistStatus(status);
          if (!normalizedId || !normalizedStatus) return;
          state.playlistStatus.set(normalizedId, normalizedStatus);
        });
        state.allGuests = new Set(parsedData.allGuests || []);
        state.records.forEach(r => { if (r.guest) state.allGuests.add(r.guest); });
        state.weeklyPlan.forEach(cls => cls.attendees.forEach(guest => state.allGuests.add(guest)));
        rebuildPlaylistsFromData();
        debugLog('State loaded from localStorage');
      }
    } catch (e) {
      console.error("Failed to load state from localStorage", e);
    }
  }

  // ============= BLOCK 4: FIREBASE INIT & DATA LAYER =============
  // (verbatim from existing index.html)

  firebase.initializeApp(FIREBASE_CONFIG);
  const auth = firebase.auth();
  const db = firebase.firestore();
  db.enablePersistence({ synchronizeTabs: true }).catch(err => {
    if (err.code === 'failed-precondition') {
      console.warn('Firestore persistence unavailable: multiple tabs open');
    }
  });

  function getUserCollectionRef(collectionName) {
    return db.collection('users').doc(state.firebaseUser.uid).collection(collectionName);
  }

  // CRITICAL: this listener must be attached before any DOM-dependent code so
  // the iOS PWA redirect-fallback completes correctly.
  function setupAuthListener() {
    auth.onAuthStateChanged(user => {
      state.firebaseUser = user;
      if (user) {
        updateConnectionStatus();
        setupFirestoreListeners();
      } else {
        if (state.unsubRecords) { state.unsubRecords(); state.unsubRecords = null; }
        if (state.unsubClasses) { state.unsubClasses(); state.unsubClasses = null; }
        if (state.unsubPlaylists) { state.unsubPlaylists(); state.unsubPlaylists = null; }
        state.playlistTags = new Map();
        state.playlistStatus = new Map();
        state.firestoreConnected = false;
        rebuildPlaylistsFromData();
        updateConnectionStatus();
      }
      // Re-render so the UI reflects the auth change.
      renderApp();
    });
  }

  function setupFirestoreListeners() {
    if (!state.firebaseUser) return;
    if (state.unsubRecords) state.unsubRecords();
    if (state.unsubClasses) state.unsubClasses();
    if (state.unsubPlaylists) state.unsubPlaylists();

    const uid = state.firebaseUser.uid;

    state.unsubRecords = db.collection('users').doc(uid).collection('records')
      .onSnapshot(snapshot => {
        state.firestoreConnected = !snapshot.metadata.fromCache;
        state.firestoreHasPendingWrites = snapshot.metadata.hasPendingWrites;
        updateConnectionStatus();

        state.records = [];
        state.allGuests = new Set();
        snapshot.forEach(doc => {
          const normalized = normalizeRecord(doc.data());
          if (!normalized) return;
          state.records.push(normalized);
          state.allGuests.add(normalized.guest);
        });
        state.weeklyPlan.forEach(cls => {
          (cls.attendees instanceof Set ? cls.attendees : []).forEach(g => state.allGuests.add(g));
        });
        rebuildPlaylistsFromData();
        saveStateToLocalStorage();
        renderApp();
      }, error => {
        console.error('Records listener error:', error);
        showToast('Data sync error: ' + error.message, 'error');
      });

    state.unsubClasses = db.collection('users').doc(uid).collection('classes')
      .onSnapshot(snapshot => {
        state.weeklyPlan = new Map();
        state.allGuests = new Set(state.records.map(r => r.guest).filter(Boolean));
        snapshot.forEach(doc => {
          const cls = doc.data();
          cls.id = doc.id;
          cls.playlist = normalizePlaylistId(cls.playlist);
          cls.attendees = new Set(cls.attendees || []);
          cls.classType = (cls.classType || '').toString().trim();
          const key = createDateTimeKey(cls.date, cls.time);
          state.weeklyPlan.set(key, cls);
          cls.attendees.forEach(g => state.allGuests.add(g));
        });
        rebuildPlaylistsFromData();
        saveStateToLocalStorage();
        renderApp();
      }, error => {
        console.error('Classes listener error:', error);
      });

    state.unsubPlaylists = db.collection('users').doc(uid).collection('playlists')
      .onSnapshot(snapshot => {
        state.playlistTags = new Map();
        state.playlistStatus = new Map();
        snapshot.forEach(doc => {
          const data = doc.data();
          const playlistId = normalizePlaylistId(doc.id);
          if (!playlistId) return;
          if (Array.isArray(data.classTypes)) {
            const tags = data.classTypes.map(t => (t ?? '').toString().trim()).filter(Boolean);
            if (tags.length > 0) state.playlistTags.set(playlistId, Array.from(new Set(tags)));
          }
          const status = normalizePlaylistStatus(data.status);
          if (status) state.playlistStatus.set(playlistId, status);
        });
        rebuildPlaylistsFromData();
        saveStateToLocalStorage();
        renderApp();
      }, error => {
        console.error('Playlists listener error:', error);
      });
  }

  async function runFirestoreBatch(ops) {
    const CHUNK_SIZE = 500;
    for (let i = 0; i < ops.length; i += CHUNK_SIZE) {
      const chunk = ops.slice(i, i + CHUNK_SIZE);
      const batch = db.batch();
      for (const op of chunk) {
        if (op.action === 'set') batch.set(op.ref, op.data);
        else if (op.action === 'delete') batch.delete(op.ref);
        else if (op.action === 'update') batch.update(op.ref, op.data);
      }
      await batch.commit();
    }
  }

  async function writeRecordsToFirestore(classData) {
    if (!state.firebaseUser) {
      showToast('Please sign in first.', 'error');
      return false;
    }
    const recordsRef = getUserCollectionRef('records');
    const ops = [...classData.attendees].map(guest => {
      const recordKey = buildRecordKey({
        date: classData.date,
        time: normalizeTime(classData.time),
        guest,
        playlist: classData.playlist
      });
      return {
        action: 'set',
        ref: recordsRef.doc(safeDocId(recordKey)),
        data: { date: classData.date, time: normalizeTime(classData.time), guest, playlist: classData.playlist, recordKey }
      };
    });

    try {
      await runFirestoreBatch(ops);
      showToast(`Synced ${classData.attendees.size} records`, 'success');
      return true;
    } catch (error) {
      showToast('Sync failed: ' + error.message, 'error');
      return false;
    }
  }

  async function saveClassToFirestore(dateTimeKey, classData) {
    if (!state.firebaseUser) {
      showToast('Please sign in first.', 'error');
      return false;
    }
    try {
      await getUserCollectionRef('classes').doc(safeDocId(dateTimeKey)).set({
        date: classData.date,
        time: classData.time,
        playlist: classData.playlist,
        attendees: Array.from(classData.attendees),
        status: classData.status || 'draft',
        notes: classData.notes || '',
        classType: classData.classType || '',
        dateTimeKey
      });
      return true;
    } catch (error) {
      showToast('Save failed: ' + error.message, 'error');
      return false;
    }
  }

  async function deleteClassFromFirestore(dateTimeKey) {
    if (!state.firebaseUser) return;
    await getUserCollectionRef('classes').doc(safeDocId(dateTimeKey)).delete();
  }

  async function clearAllFirestoreData() {
    if (!state.firebaseUser) return;
    const uid = state.firebaseUser.uid;
    const collections = ['records', 'classes', 'playlists'];
    for (const col of collections) {
      let snapshot;
      do {
        snapshot = await db.collection('users').doc(uid).collection(col).limit(500).get();
        if (snapshot.empty) break;
        const batch = db.batch();
        snapshot.docs.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
      } while (!snapshot.empty);
    }
  }

  async function upsertPlaylistMetadata(playlistId, payload) {
    if (!state.firebaseUser || !playlistId) return;
    const keys = Object.keys(payload || {});
    if (keys.length === 0) return;
    await db.collection('users').doc(state.firebaseUser.uid)
      .collection('playlists').doc(playlistId)
      .set(payload, { merge: true });
  }

  async function updatePlaylistMetadata(playlistNum, changes) {
    const playlistId = normalizePlaylistId(playlistNum);
    if (!playlistId) return;
    const payload = {};

    if (changes.status !== undefined) {
      const normalizedStatus = normalizePlaylistStatus(changes.status);
      if (!normalizedStatus) return;
      state.playlistStatus.set(playlistId, normalizedStatus);
      payload.status = normalizedStatus;
    }

    if (changes.addTag !== undefined) {
      const trimmed = changes.addTag.trim();
      if (!trimmed) return;
      const current = state.playlistTags.get(playlistId) || [];
      if (current.includes(trimmed)) return;
      const updated = [...current, trimmed];
      state.playlistTags.set(playlistId, updated);
      payload.classTypes = updated;
    }

    if (changes.removeTag !== undefined) {
      const current = state.playlistTags.get(playlistId) || [];
      const updated = current.filter(t => t !== changes.removeTag);
      if (updated.length > 0) {
        state.playlistTags.set(playlistId, updated);
      } else {
        state.playlistTags.delete(playlistId);
      }
      payload.classTypes = updated;
    }

    if (changes.removeTag !== undefined) {
      rebuildPlaylistsFromData();
    } else {
      ensurePlaylistInState(playlistId);
    }

    saveStateToLocalStorage();
    renderApp();

    if (state.firebaseUser && Object.keys(payload).length > 0) {
      try {
        await upsertPlaylistMetadata(playlistId, payload);
      } catch (err) {
        showToast('Playlist save failed: ' + err.message, 'error');
      }
    }
  }

  async function addNewPlaylist(rawId) {
    const playlistId = normalizePlaylistId(rawId);
    if (!playlistId) return { ok: false, error: 'Invalid playlist number. Use a numeric value (e.g. 13 or 2.5).' };
    if (state.playlists.includes(playlistId)) return { ok: false, error: `Playlist #${playlistId} already exists.` };
    state.playlists.push(playlistId);
    state.playlists.sort(comparePlaylistIds);
    state.playlistStatus.set(playlistId, 'Active');
    saveStateToLocalStorage();
    renderApp();
    if (state.firebaseUser) {
      try {
        await upsertPlaylistMetadata(playlistId, { status: 'Active', classTypes: [] });
      } catch (err) {
        showToast('Playlist save failed: ' + err.message, 'error');
      }
    }
    showToast(`Playlist #${playlistId} added`, 'success');
    return { ok: true };
  }

  async function removePlaylist(playlistNum) {
    const playlistId = normalizePlaylistId(playlistNum);
    if (!playlistId) return;
    const upcoming = Array.from(state.weeklyPlan.values()).filter(
      c => normalizePlaylistId(c.playlist) === playlistId && c.status !== 'finalized'
    );
    if (upcoming.length > 0) {
      if (!confirm(`Playlist #${playlistId} is assigned to ${upcoming.length} upcoming class(es). Remove anyway?`)) return;
    } else {
      if (!confirm(`Remove Playlist #${playlistId}? Historical records will be kept.`)) return;
    }
    state.playlists = state.playlists.filter(p => p !== playlistId);
    state.playlistTags.delete(playlistId);
    state.playlistStatus.set(playlistId, 'Removed');
    if (state.expandedPlaylist === playlistId) state.expandedPlaylist = null;
    rebuildPlaylistsFromData();
    saveStateToLocalStorage();
    renderApp();
    if (state.firebaseUser) {
      try {
        await upsertPlaylistMetadata(playlistId, { status: 'Removed', classTypes: [] });
      } catch (err) {
        showToast('Playlist delete failed: ' + err.message, 'error');
      }
    }
    showToast(`Playlist #${playlistId} removed`, 'success');
  }

  // ============= BLOCK 5: METRICS ENGINE =============
  // (verbatim from existing index.html)

  function lastHeardMap(referenceDate) {
    const refDate = parseDateInput(referenceDate || formatDateKey(new Date())) || new Date();
    const map = new Map();
    state.records.forEach(r => {
      const recordDate = parseDateInput(r.date);
      if (!recordDate || recordDate > refDate) return;
      if (!map.has(r.guest)) map.set(r.guest, new Map());
      const pm = map.get(r.guest);
      const prev = pm.get(r.playlist);
      if (!prev || recordDate > parseDateInput(prev)) {
        pm.set(r.playlist, r.date);
      }
    });
    return map;
  }

  function computeMetrics(opts = {}) {
    const refDateISO = opts.date || formatDateKey(new Date());
    const lm = lastHeardMap(refDateISO);
    const rosterSource = opts.attendees instanceof Set ? Array.from(opts.attendees) : Array.from(opts.attendees || []);
    const roster = rosterSource.filter(Boolean);
    if (roster.length === 0) return [];
    const windowDays = Number.isFinite(opts.window) ? opts.window : state.selectedWindow;
    const classTypeFilter = opts.classType !== undefined ? opts.classType : '';
    const classTypeFilterLower = classTypeFilter.toLowerCase();
    const filteredPlaylists = state.playlists.filter(pl => {
      const status = normalizePlaylistStatus(state.playlistStatus.get(pl) || 'Active');
      if (status === 'Retired' || status === 'Removed') return false;
      if (classTypeFilterLower) {
        const tags = state.playlistTags.get(pl) || [];
        return tags.some(t => t.toLowerCase() === classTypeFilterLower);
      }
      return true;
    });
    const byPlaylist = filteredPlaylists.map(pl => {
      let never = 0;
      let deltas = [];
      let dueCount = 0;
      let recentCount = 0;
      roster.forEach(g => {
        const last = lm.get(g)?.get(pl);
        if (!last) {
          never++;
          return;
        } else {
          const d = daysBetween(refDateISO, last);
          if (d < 0) {
            never++;
            return;
          }
          deltas.push(d);
          if (d >= windowDays) {
            dueCount++;
          } else {
            recentCount++;
          }
        }
      });
      const medianDays = deltas.length ? median(deltas) : 0;
      const rosterSize = roster.length;
      const neverPct = rosterSize ? Math.round((never / rosterSize) * 100) : 0;
      const duePct = rosterSize ? Math.round((dueCount / rosterSize) * 100) : 0;
      const recentPct = rosterSize ? Math.round((recentCount / rosterSize) * 100) : 0;
      const score = (neverPct * 3.4) + (duePct * 2.2) + (medianDays * 0.12) - (recentPct * 2.6);

      return {
        playlist: pl,
        never,
        dueCount,
        recentCount,
        heardCount: deltas.length,
        median: medianDays,
        stalePct: duePct,
        readyPct: duePct,
        neverPct,
        recentPct,
        rosterSize,
        score
      };
    });
    byPlaylist.sort((a, b) => {
      if (b.score !== a.score) return b.score - a.score;
      if (b.neverPct !== a.neverPct) return b.neverPct - a.neverPct;
      if (b.readyPct !== a.readyPct) return b.readyPct - a.readyPct;
      if (b.median !== a.median) return b.median - a.median;
      return comparePlaylistIds(a.playlist, b.playlist);
    });
    return byPlaylist;
  }

  function getRecommendationStrength(metrics) {
    const best = metrics[0];
    if (!best) return null;
    const second = metrics[1];
    if (!second) {
      return {
        tone: 'strong',
        label: 'High confidence',
        detail: 'Only one active playlist matches current filters.',
        gap: null
      };
    }
    const gap = Math.max(0, best.score - second.score);
    const roundedGap = Math.round(gap * 10) / 10;
    if (gap >= 18) {
      return {
        tone: 'strong',
        label: 'High confidence',
        detail: `${roundedGap} points ahead of #${second.playlist}.`,
        gap: roundedGap
      };
    }
    if (gap >= 8) {
      return {
        tone: 'moderate',
        label: 'Medium confidence',
        detail: `${roundedGap} points ahead of #${second.playlist}.`,
        gap: roundedGap
      };
    }
    return {
      tone: 'close',
      label: 'Close decision',
      detail: `${roundedGap} points ahead of #${second.playlist}. Check runner-ups.`,
      gap: roundedGap
    };
  }

  function getRecommenderClassEntries() {
    return Array.from(state.weeklyPlan.entries())
      .map(([key, cls]) => ({ key, cls }))
      .filter(({ cls }) => cls.status !== 'finalized')
      .sort((a, b) => a.key.localeCompare(b.key));
  }

  function getSelectedRecommenderClassEntries() {
    const entries = getRecommenderClassEntries();
    if (entries.length === 0) {
      state.selectedRecommendationClassKeys.clear();
      return [];
    }
    if (state.selectedRecommendationClassKeys.size === 0 && !state.recAutoSelectDone) {
      state.recAutoSelectDone = true;
      const now = new Date();
      const nowKey = createDateTimeKey(
        formatDateKey(now),
        normalizeTime(`${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`)
      );
      const nextDraft = entries.find(entry => entry.cls.status !== 'finalized' && entry.key >= nowKey)
        || entries.find(entry => entry.cls.status !== 'finalized');
      if (nextDraft) {
        state.selectedRecommendationClassKeys.add(nextDraft.key);
      }
    }
    const validKeys = new Set(entries.map(e => e.key));
    for (const key of state.selectedRecommendationClassKeys) {
      if (!validKeys.has(key)) state.selectedRecommendationClassKeys.delete(key);
    }
    return entries.filter(e => state.selectedRecommendationClassKeys.has(e.key));
  }

  function getMetricsForSelectedClasses(selectedEntries) {
    if (!selectedEntries || selectedEntries.length === 0) return [];
    const mergedAttendees = new Set();
    selectedEntries.forEach(entry => {
      const cls = entry.cls || {};
      const att = cls.attendees instanceof Set ? cls.attendees : new Set(cls.attendees || []);
      att.forEach(g => mergedAttendees.add(g));
    });
    if (mergedAttendees.size === 0) return [];
    const classTypes = selectedEntries.map(e => (e.cls.classType || '').trim()).filter(Boolean);
    const uniqueTypes = new Set(classTypes.map(t => t.toLowerCase()));
    const classType = uniqueTypes.size === 1 ? classTypes[0] : '';
    const dates = selectedEntries.map(e => e.cls.date).filter(Boolean).sort();
    const refDate = dates[0] || formatDateKey(new Date());
    return computeMetrics({
      attendees: mergedAttendees,
      classType,
      window: state.selectedWindow,
      date: refDate
    });
  }

  // ── Per-screen render functions (Phase 1 placeholders) ──
  // Each is a single-line stub that writes the screen name into the

  // ── Schedule helpers ─────────────────────────────────────
  // ISO week start (Monday). Existing `getWeekStart` uses Sunday; the
  // new design uses ISO Mon–Sun.
  function getIsoWeekStart(date) {
    const d = parseDateInput(date) || new Date();
    d.setHours(0, 0, 0, 0);
    const dow = d.getDay(); // 0..6, Sunday = 0
    const offset = dow === 0 ? -6 : 1 - dow; // back up to Monday
    d.setDate(d.getDate() + offset);
    return d;
  }
  function isoWeekKey(date) {
    return formatDateKey(getIsoWeekStart(date));
  }
  function addDays(date, n) {
    const d = parseDateInput(date) || new Date();
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() + n);
    return d;
  }
  function pad2(n) { return String(n).padStart(2, '0'); }
  const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MONTH_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const DAY_LETTER = ['S','M','T','W','T','F','S'];

  // Build the agenda data: past 7 days + 35 days (5 weeks) forward = 42 days.
  function buildAgendaData(referenceDate) {
    const ref = parseDateInput(referenceDate) || new Date();
    ref.setHours(0, 0, 0, 0);
    const startISOdate = formatDateKey(addDays(ref, -7));
    const endISOdate   = formatDateKey(addDays(ref, 35));
    const todayISO = formatDateKey(ref);

    // Group classes by day from state.weeklyPlan.
    const byDay = new Map();
    state.weeklyPlan.forEach((cls, key) => {
      if (!cls || !cls.date) return;
      if (cls.date < startISOdate || cls.date > endISOdate) return;
      const list = byDay.get(cls.date) || [];
      list.push({ key, cls });
      byDay.set(cls.date, list);
    });
    // Sort each day's classes by time.
    byDay.forEach(list => list.sort((a, b) =>
      (a.cls.time || '').localeCompare(b.cls.time || '')));

    const days = [];
    for (let i = -7; i <= 35; i++) {
      const d = addDays(ref, i);
      const iso = formatDateKey(d);
      const dow = d.getDay();
      days.push({
        iso,
        date: d.getDate(),
        monthIdx: d.getMonth(),
        monthShort: MONTH_SHORT[d.getMonth()],
        monthLong: MONTH_LONG[d.getMonth()],
        dayName: DAY_SHORT[dow],
        dayLetter: DAY_LETTER[dow],
        isToday: iso === todayISO,
        isPast: iso < todayISO,
        weekStartISO: formatDateKey(getIsoWeekStart(d)),
        classes: byDay.get(iso) || []
      });
    }
    return { days, todayISO, refDate: ref };
  }

  // Format the week-divider label.
  function weekDividerLabel(weekStartISO, todayWeekStartISO) {
    const start = parseDateInput(weekStartISO);
    if (!start) return '';
    const end = addDays(start, 6);
    const today = parseDateInput(todayWeekStartISO);
    if (today) {
      const diff = Math.round((start.getTime() - today.getTime()) / (1000*60*60*24));
      if (diff === 0) return 'This week';
      if (diff === 7) return 'Next week';
      if (diff === -7) return 'Last week';
    }
    const sm = MONTH_SHORT[start.getMonth()];
    const em = MONTH_SHORT[end.getMonth()];
    if (sm === em) return `Week of ${sm} ${start.getDate()} – ${end.getDate()}`;
    return `Week of ${sm} ${start.getDate()} – ${em} ${end.getDate()}`;
  }

  function userInitials(user) {
    if (!user || !user.displayName) return 'JS';
    const parts = user.displayName.trim().split(/\s+/).filter(Boolean);
    if (parts.length === 0) return 'JS';
    const first = parts[0][0] || '';
    const last = parts.length > 1 ? (parts[parts.length - 1][0] || '') : '';
    return (first + last).toUpperCase() || 'JS';
  }

  function syncDotClass() {
    if (!state.firebaseUser) return 'a-header__sync-dot--gray';
    if (state.firestoreHasPendingWrites) return 'a-header__sync-dot--amber';
    if (state.firestoreConnected) return 'a-header__sync-dot--green';
    return 'a-header__sync-dot--amber';
  }

  // Convert raw HH:mm time to display label like "7 AM" or "7:30 AM".
  function timeShortLabel(time) {
    if (!time) return '';
    const [hStr, mStr] = time.split(':');
    const h = parseInt(hStr, 10);
    const m = parseInt(mStr || '0', 10);
    if (Number.isNaN(h)) return time;
    const ampm = h >= 12 ? 'PM' : 'AM';
    const dh = h % 12 || 12;
    if (m === 0) return `${dh} ${ampm}`;
    return `${dh}:${pad2(m)} ${ampm}`;
  }

  // Build a normalized "last heard" line for a guest+playlist.
  function lastHeardLineFor(guest, playlistId, refISO) {
    if (!playlistId) return { label: 'No playlist', sub: '', mod: 'never' };
    const lm = lastHeardMap(refISO || formatDateKey(new Date()));
    const last = lm.get(guest)?.get(playlistId);
    if (!last) return { label: `Never heard #${playlistId}`, sub: 'first time', mod: 'never' };
    const days = daysBetween(refISO || formatDateKey(new Date()), last);
    if (days < 0) return { label: `Never heard #${playlistId}`, sub: 'first time', mod: 'never' };
    if (days === 0) return { label: 'Today', sub: 'recent', mod: 'stale' };
    if (days < 14) return { label: `${days}d ago`, sub: 'recent', mod: 'stale' };
    if (days < 30) return { label: `${days}d ago`, sub: '', mod: '' };
    return { label: `${days}d ago`, sub: 'fresh again', mod: 'fresh' };
  }

  // Generic sheet controller. Sheets render inside #sheet-layer
  // (a body-root portal) so they aren't clipped by hilo-scroll.
  // Multiple sheets stack via z-index 500 + (10 * stack depth).
  function openSheet({ title = '', body, height = 'tall', onClose, hideClose = false } = {}) {
    const layer = document.getElementById('sheet-layer');
    if (!layer) return null;

    // Build DOM.
    const root = document.createElement('div');
    root.className = 'hilo-sheet-portal';
    root.style.cssText = 'position:absolute;inset:0;pointer-events:none;';

    const overlay = document.createElement('div');
    overlay.className = 'hilo-sheet-overlay';

    const sheet = document.createElement('div');
    sheet.className = 'hilo-sheet hilo-sheet--' + (height === 'short' ? 'short' : 'tall');

    const handle = document.createElement('div');
    handle.className = 'hilo-sheet__handle';
    sheet.appendChild(handle);

    const header = document.createElement('div');
    header.className = 'hilo-sheet__header';
    const titleEl = document.createElement('div');
    titleEl.className = 'hilo-sheet__title';
    titleEl.textContent = title;
    header.appendChild(titleEl);

    if (!hideClose) {
      const closeBtn = document.createElement('button');
      closeBtn.type = 'button';
      closeBtn.className = 'hilo-sheet__close';
      closeBtn.setAttribute('aria-label', 'Close');
      closeBtn.innerHTML = ICONS.close;
      closeBtn.addEventListener('click', () => closeSheet());
      header.appendChild(closeBtn);
    }
    sheet.appendChild(header);

    // Body content area.
    const bodyEl = document.createElement('div');
    bodyEl.className = 'hilo-sheet__body';
    if (body instanceof HTMLElement) {
      bodyEl.appendChild(body);
    } else if (typeof body === 'string') {
      bodyEl.innerHTML = body;
    }
    sheet.appendChild(bodyEl);

    root.appendChild(overlay);
    root.appendChild(sheet);

    // z-index: stack the second sheet above the first.
    const depth = state.sheetStack.length;
    root.style.zIndex = String(500 + depth * 10);
    root.style.pointerEvents = 'auto';

    layer.appendChild(root);

    // Tap on overlay → close topmost sheet only.
    overlay.addEventListener('click', () => {
      const top = state.sheetStack[state.sheetStack.length - 1];
      if (top && top.id === id) closeSheet();
    });

    // Animate open on next frame so transition takes effect.
    requestAnimationFrame(() => {
      overlay.classList.add('is-open');
      sheet.classList.add('is-open');
    });

    // Push history state so Android back gesture closes the sheet.
    let popstateMarker = null;
    try {
      popstateMarker = 'sheet-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
      history.pushState({ sheet: popstateMarker }, '');
    } catch (e) { /* history disabled — fine */ }

    const id = 'sheet-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
    const entry = { id, root, overlay, sheet, body: bodyEl, onClose, popstateMarker };
    state.sheetStack.push(entry);

    return {
      close: () => closeSheet(id),
      setBody: (newBody) => {
        bodyEl.innerHTML = '';
        if (newBody instanceof HTMLElement) bodyEl.appendChild(newBody);
        else if (typeof newBody === 'string') bodyEl.innerHTML = newBody;
      },
      setTitle: (newTitle) => { titleEl.textContent = newTitle; },
      bodyEl
    };
  }

  function closeSheet(targetId) {
    if (state.sheetStack.length === 0) return;
    let entry;
    if (targetId) {
      const idx = state.sheetStack.findIndex(e => e.id === targetId);
      if (idx === -1) return;
      entry = state.sheetStack.splice(idx, 1)[0];
    } else {
      entry = state.sheetStack.pop();
    }
    if (!entry) return;

    entry.overlay.classList.remove('is-open');
    entry.sheet.classList.remove('is-open');

    // Wait for transition then remove DOM.
    let removed = false;
    const remove = () => {
      if (removed) return;
      removed = true;
      if (entry.root && entry.root.parentNode) entry.root.parentNode.removeChild(entry.root);
      if (typeof entry.onClose === 'function') {
        try { entry.onClose(); } catch (e) { console.warn('Sheet onClose error:', e); }
      }
    };
    entry.sheet.addEventListener('transitionend', remove, { once: true });
    setTimeout(remove, 360);

    // Pop the popstate marker if we pushed one and it's still on top.
    if (entry.popstateMarker) {
      try {
        if (history.state && history.state.sheet === entry.popstateMarker) {
          // Use replaceState to avoid creating an extra back step
          history.back();
        }
      } catch (e) { /* fine */ }
    }
  }

  function closeAllSheets() {
    while (state.sheetStack.length > 0) closeSheet();
  }

  // Global handlers — attach once.
  if (!window.__hiloSheetHandlersAttached) {
    window.__hiloSheetHandlersAttached = true;
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && state.sheetStack.length > 0) {
        e.preventDefault();
        closeSheet();
      }
    });
    window.addEventListener('popstate', () => {
      // If a sheet is open, close it (history.back already happened).
      if (state.sheetStack.length > 0) {
        // Mark the entry's marker as null so closeSheet doesn't re-back().
        const top = state.sheetStack[state.sheetStack.length - 1];
        if (top) top.popstateMarker = null;
        closeSheet();
      }
    });
  }

  function buildSheetActions(buttons) {

    row.className = 'sheet-actions';
    buttons.forEach(b => row.appendChild(b));
    return row;
  }

  // ── Helper: section label inside a sheet body ──────────
  function sheetLabel(text) {
    const el = document.createElement('div');
    el.className = 'sheet-field__label';
    el.textContent = text;
    return el;
  }

  // ── Playlist Picker ─────────────────────────────────────
  function openPlaylistPickerSheet(dateTimeKey, onSelect) {
    const cls = state.weeklyPlan.get(dateTimeKey);
    if (!cls) {
      showToast('Class not found', 'error');
      return;
    }
    const rosterSet = cls.attendees instanceof Set
      ? cls.attendees
      : new Set(cls.attendees || []);

    const body = document.createElement('div');

    // Empty state if no attendees.
    if (rosterSet.size === 0) {
      const empty = document.createElement('div');
      empty.className = 'sheet-picker-empty';
      empty.innerHTML = `
        <div style="font-size:15px;color:var(--text-secondary);margin-bottom:6px;font-weight:600;">No guests yet</div>
        <div>Add guests to get a recommendation.</div>`;
      body.appendChild(empty);
      openSheet({ title: 'Select Playlist', body, height: 'short' });
      return;
    }

    const sub = document.createElement('div');
    sub.style.cssText = 'font-size:12.5px;color:var(--text-tertiary);margin-bottom:14px;';
    sub.textContent = 'Ranked by freshness for this group';
    body.appendChild(sub);

    const metrics = computeMetrics({
      attendees: rosterSet,
      classType: cls.classType || '',
      window: state.selectedWindow,
      date: cls.date || formatDateKey(new Date())
    });

    if (!metrics.length) {
      const empty = document.createElement('div');
      empty.className = 'sheet-picker-empty';
      empty.textContent = 'No matching playlists. Add tags or choose a different class type.';
      body.appendChild(empty);
      openSheet({ title: 'Select Playlist', body, height: 'short' });
      return;
    }

    const list = document.createElement('div');
    list.className = 'sheet-picker-list';

    metrics.forEach((m) => {
      const isCurrent = String(m.playlist) === String(cls.playlist || '');
      const row = document.createElement('button');
      row.type = 'button';
      row.className = 'sheet-picker-row' + (isCurrent ? ' sheet-picker-row--current' : '');

      const num = document.createElement('div');
      num.className = 'sheet-picker-row__num';
      num.textContent = m.playlist;

      const meta = document.createElement('div');
      meta.className = 'sheet-picker-row__meta';
      const title = document.createElement('div');
      title.className = 'sheet-picker-row__title';
      title.textContent = 'Playlist #' + m.playlist;
      meta.appendChild(title);
      const tags = state.playlistTags.get(m.playlist) || [];
      if (tags.length > 0) {
        const tagWrap = document.createElement('div');
        tagWrap.className = 'sheet-picker-row__tags';
        tags.forEach(t => {
          const c = document.createElement('span');
          c.className = 'sheet-picker-row__tag';
          c.textContent = t;
          tagWrap.appendChild(c);
        });
        meta.appendChild(tagWrap);
      }
      const sub2 = document.createElement('div');
      sub2.className = 'sheet-picker-row__sub';
      const medianStr = m.heardCount ? `median ${m.median}d ago` : 'no history';
      sub2.textContent = `${medianStr} · ${m.neverPct}% never heard`;
      meta.appendChild(sub2);
      row.appendChild(num);
      row.appendChild(meta);

      const score = document.createElement('div');
      score.className = 'sheet-picker-row__score';
      const sNum = document.createElement('div');
      sNum.className = 'sheet-picker-row__score-num';
      sNum.textContent = String(Math.round(m.score));
      const sLab = document.createElement('div');
      sLab.className = 'sheet-picker-row__score-label';
      sLab.textContent = 'Score';
      score.appendChild(sNum);
      score.appendChild(sLab);
      row.appendChild(score);

      if (isCurrent) {
        const check = document.createElement('div');
        check.className = 'sheet-picker-row__check';
        check.innerHTML = ICONS.check;
        row.appendChild(check);
      }

      row.addEventListener('click', async () => {
        const newPlaylistId = String(m.playlist);
        if (typeof onSelect === 'function') {
          try { onSelect(newPlaylistId); } catch (e) { console.warn(e); }
        } else {
          // Default: persist directly.
          await saveClassToFirestore(dateTimeKey, {
            date: cls.date,
            time: cls.time,
            playlist: newPlaylistId,
            attendees: rosterSet,
            status: cls.status || 'draft',
            notes: cls.notes || '',
            classType: cls.classType || ''
          });
          // Mirror locally too in case Firebase isn't signed in.
          cls.playlist = newPlaylistId;
          state.weeklyPlan.set(dateTimeKey, cls);
          saveStateToLocalStorage();
          renderApp();
        }
        closeSheet();
      });

      list.appendChild(row);
    });

    body.appendChild(list);

    openSheet({ title: 'Select Playlist', body, height: 'tall' });
  }

  // ── Helper: build a guest checkbox list with search ─────
  function buildGuestPicker({ initialSelected = new Set(), onChange = null } = {}) {
    const wrap = document.createElement('div');
    const selected = new Set([...initialSelected]);

    const headerRow = document.createElement('div');
    headerRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;';
    const search = document.createElement('div');
    search.className = 'sheet-search';
    search.style.flex = '1';
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Search guests…';
    search.appendChild(input);
    headerRow.appendChild(search);

    const addNewBtn = document.createElement('button');
    addNewBtn.type = 'button';
    addNewBtn.className = 'hilo-pill hilo-pill--accent';
    addNewBtn.style.flexShrink = '0';
    addNewBtn.innerHTML = `${ICONS.plus14}<span>New</span>`;
    headerRow.appendChild(addNewBtn);

    wrap.appendChild(headerRow);

    const countEl = document.createElement('div');
    countEl.style.cssText = 'font-size:12px;color:var(--text-tertiary);margin-bottom:6px;';
    wrap.appendChild(countEl);

    const list = document.createElement('div');
    list.className = 'sheet-checkbox-list';
    wrap.appendChild(list);

    function renderList() {
      const q = input.value.trim().toLowerCase();
      const all = Array.from(state.allGuests).sort((a, b) =>
        a.localeCompare(b, undefined, { sensitivity: 'base' }));
      const filtered = q ? all.filter(g => g.toLowerCase().includes(q)) : all;
      list.innerHTML = '';
      if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.style.cssText = 'padding:18px 0;color:var(--text-tertiary);text-align:center;font-size:13.5px;';
        empty.textContent = q ? 'No guests match' : 'No guests yet — tap "New" to add one.';
        list.appendChild(empty);
      } else {
        filtered.forEach(name => {
          const row = document.createElement('div');
          const isSel = selected.has(name);
          row.className = 'sheet-checkbox-row' + (isSel ? ' sheet-checkbox-row--checked' : '');
          row.innerHTML = `
            <div class="sheet-checkbox-row__av">${esc((name[0] || '?').toUpperCase())}</div>
            <div class="sheet-checkbox-row__name">${esc(name)}</div>
            <div class="sheet-checkbox-row__check">${ICONS.check}</div>`;
          row.addEventListener('click', () => {
            if (selected.has(name)) selected.delete(name);
            else selected.add(name);
            renderList();
            if (typeof onChange === 'function') onChange(new Set(selected));
          });
          list.appendChild(row);
        });
      }
      countEl.textContent = selected.size === 0
        ? 'No guests selected'
        : `${selected.size} selected`;
    }

    input.addEventListener('input', renderList);
    addNewBtn.addEventListener('click', () => {
      openAddGuestSheet({ onAdd: (name) => {
        selected.add(name);
        renderList();
        if (typeof onChange === 'function') onChange(new Set(selected));
      }});
    });

    renderList();

    return {
      element: wrap,
      getSelected: () => new Set(selected),
      setSelected: (s) => { selected.clear(); s.forEach(g => selected.add(g)); renderList(); }
    };
  }

  // ── Helper: build a date strip selector (14 days from today or prefill) ──
  function buildDateStrip({ value, onChange }) {
    const wrap = document.createElement('div');
    wrap.className = 'sheet-date-strip';
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    let selectedIso = value || formatDateKey(today);

    function render() {
      wrap.innerHTML = '';
      // 14 days starting today
      for (let i = 0; i < 14; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        const iso = formatDateKey(d);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'sheet-date-cell' + (iso === selectedIso ? ' sheet-date-cell--active' : '');
        const dayName = d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0, 3);
        btn.innerHTML = `
          <span class="sheet-date-cell__name">${esc(dayName)}</span>
          <span class="sheet-date-cell__num">${d.getDate()}</span>`;
        btn.addEventListener('click', () => {
          selectedIso = iso;
          render();
          if (typeof onChange === 'function') onChange(selectedIso);
        });
        wrap.appendChild(btn);
      }
    }
    render();
    return {
      element: wrap,
      getValue: () => selectedIso,
      setValue: (iso) => { selectedIso = iso; render(); }
    };
  }

  // ── Helper: build a time picker (common pills + "More times…" select) ──
  function buildTimePicker({ value, onChange }) {
    const wrap = document.createElement('div');
    const COMMON_TIMES = [
      '06:00', '07:00', '08:00', '09:00',
      '10:00', '11:00', '12:00', '13:00',
      '17:00', '18:00', '19:00', '20:00'
    ];
    let selected = normalizeTime(value || '18:00');

    const grid = document.createElement('div');
    grid.className = 'sheet-time-grid';
    wrap.appendChild(grid);

    const moreLink = document.createElement('button');
    moreLink.type = 'button';
    moreLink.className = 'sheet-time-more-link';
    moreLink.textContent = 'More times…';
    wrap.appendChild(moreLink);

    const moreSelect = document.createElement('select');
    moreSelect.className = 'sheet-input';
    moreSelect.style.display = 'none';
    moreSelect.style.marginTop = '6px';
    // 15-min increments from 05:00 to 21:00
    for (let h = 5; h <= 21; h++) {
      for (let m = 0; m < 60; m += 15) {
        const ts = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        const opt = document.createElement('option');
        opt.value = ts;
        opt.textContent = formatTime(ts);
        moreSelect.appendChild(opt);
      }
    }
    moreSelect.value = selected;
    wrap.appendChild(moreSelect);

    function render() {
      grid.innerHTML = '';
      COMMON_TIMES.forEach(t => {
        const pill = document.createElement('button');
        pill.type = 'button';
        pill.className = 'sheet-pill' + (t === selected ? ' sheet-pill--active' : '');
        pill.textContent = formatTime(t);
        pill.addEventListener('click', () => {
          selected = t;
          moreSelect.value = t;
          render();
          if (typeof onChange === 'function') onChange(selected);
        });
        grid.appendChild(pill);
      });
    }
    moreLink.addEventListener('click', () => {
      moreSelect.style.display = moreSelect.style.display === 'none' ? 'block' : 'none';
    });
    moreSelect.addEventListener('change', () => {
      selected = moreSelect.value;
      render();
      if (typeof onChange === 'function') onChange(selected);
    });
    render();
    return {
      element: wrap,
      getValue: () => selected,
      setValue: (v) => { selected = normalizeTime(v); moreSelect.value = selected; render(); }
    };
  }

  // ── Helper: class type pills (built-in + history-derived + custom) ──
  function buildClassTypePicker({ value, onChange }) {
    const wrap = document.createElement('div');
    let selected = value || '';
    let customMode = false;

    const pillsRow = document.createElement('div');
    pillsRow.className = 'sheet-pills';
    wrap.appendChild(pillsRow);

    const customRow = document.createElement('div');
    customRow.style.cssText = 'margin-top:10px;display:none;';
    const customInput = document.createElement('input');
    customInput.type = 'text';
    customInput.className = 'sheet-input';
    customInput.placeholder = 'Custom type…';
    customRow.appendChild(customInput);
    wrap.appendChild(customRow);

    function render() {
      pillsRow.innerHTML = '';
      const types = getAllClassTypes();
      // Ensure we include selected if it's not in built-in list
      if (selected && !types.includes(selected)) types.push(selected);

      types.forEach(t => {
        const pill = document.createElement('button');
        pill.type = 'button';
        pill.className = 'sheet-pill' + (t === selected && !customMode ? ' sheet-pill--active' : '');
        pill.textContent = t;
        pill.addEventListener('click', () => {
          selected = t;
          customMode = false;
          customRow.style.display = 'none';
          render();
          if (typeof onChange === 'function') onChange(selected);
        });
        pillsRow.appendChild(pill);
      });

      const customPill = document.createElement('button');
      customPill.type = 'button';
      customPill.className = 'sheet-pill' + (customMode ? ' sheet-pill--active' : '');
      customPill.innerHTML = `${ICONS.plus14}<span>Custom</span>`;
      customPill.addEventListener('click', () => {
        customMode = true;
        customRow.style.display = 'block';
        customInput.focus();
        render();
      });
      pillsRow.appendChild(customPill);
    }
    customInput.addEventListener('input', () => {
      selected = customInput.value.trim();
      if (typeof onChange === 'function') onChange(selected);
    });
    render();
    return {
      element: wrap,
      getValue: () => selected,
      setValue: (v) => { selected = v || ''; customMode = false; customRow.style.display = 'none'; render(); }
    };
  }

  // ── Add Class Sheet ─────────────────────────────────────
  function openAddClassSheet(prefillIso) {
    const todayIso = formatDateKey(new Date());
    const initialIso = prefillIso || todayIso;

    const body = document.createElement('div');

    // Date
    const dateField = document.createElement('div');
    dateField.className = 'sheet-field';
    dateField.appendChild(sheetLabel('Date'));
    const dateStrip = buildDateStrip({ value: initialIso });
    dateField.appendChild(dateStrip.element);
    body.appendChild(dateField);

    // Time
    const timeField = document.createElement('div');
    timeField.className = 'sheet-field';
    timeField.appendChild(sheetLabel('Time'));
    const timePicker = buildTimePicker({ value: '18:00' });
    timeField.appendChild(timePicker.element);
    body.appendChild(timeField);

    // Class type
    const typeField = document.createElement('div');
    typeField.className = 'sheet-field';
    typeField.appendChild(sheetLabel('Class type'));
    const typePicker = buildClassTypePicker({ value: '' });
    typeField.appendChild(typePicker.element);
    body.appendChild(typeField);

    // Guests
    const guestField = document.createElement('div');
    guestField.className = 'sheet-field';
    guestField.appendChild(sheetLabel('Guests'));
    const guestPicker = buildGuestPicker({ initialSelected: new Set() });
    guestField.appendChild(guestPicker.element);
    body.appendChild(guestField);

    // Error region
    const errorEl = document.createElement('div');
    errorEl.className = 'sheet-error';
    errorEl.style.display = 'none';
    body.appendChild(errorEl);

    // Footer
    const cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.className = 'hilo-btn hilo-btn--ghost';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', () => closeSheet());

    const createBtn = document.createElement('button');
    createBtn.type = 'button';
    createBtn.className = 'hilo-btn hilo-btn--primary';
    createBtn.innerHTML = `${ICONS.check}<span>Create class</span>`;
    createBtn.addEventListener('click', async () => {
      const date = dateStrip.getValue();
      const time = timePicker.getValue();
      const type = typePicker.getValue();
      const attendees = guestPicker.getSelected();

      const errors = [];
      if (!date) errors.push('Pick a date.');
      if (!time) errors.push('Pick a time.');
      if (!type) errors.push('Pick a class type.');
      if (attendees.size === 0) errors.push('Add at least one guest.');

      if (errors.length > 0) {
        errorEl.textContent = errors[0];
        errorEl.style.display = 'block';
        return;
      }
      errorEl.style.display = 'none';
      setLoading(createBtn, true);

      const dateTimeKey = createDateTimeKey(date, time);
      const classData = {
        date,
        time: normalizeTime(time),
        playlist: '',
        attendees,
        status: 'draft',
        notes: '',
        classType: type,
        dateTimeKey
      };

      // Always persist locally; Firestore only if signed in.
      state.weeklyPlan.set(dateTimeKey, classData);
      saveStateToLocalStorage();

      let saved = true;
      if (state.firebaseUser) {
        saved = await saveClassToFirestore(dateTimeKey, classData);
      }

      setLoading(createBtn, false);
      if (saved) {
        showToast('Class added', 'success');
        renderApp();
        closeSheet();
      }
    });

    body.appendChild(buildSheetActions([cancelBtn, createBtn]));

    openSheet({ title: 'New Class', body, height: 'tall' });
  }

  // ── Class Edit Sheet (full editor) ──────────────────────
  function openClassEditSheet(dateTimeKey) {
    const cls = state.weeklyPlan.get(dateTimeKey);
    if (!cls) {
      showToast('Class not found', 'error');
      return;
    }
    // Working copy state
    let workingDate = cls.date;
    let workingTime = normalizeTime(cls.time || '');
    let workingType = cls.classType || '';
    let workingNotes = cls.notes || '';
    let workingPlaylist = cls.playlist || '';
    let workingAttendees = new Set(cls.attendees instanceof Set
      ? cls.attendees
      : (cls.attendees || []));

    const body = document.createElement('div');

    // Date
    const dateField = document.createElement('div');
    dateField.className = 'sheet-field';
    dateField.appendChild(sheetLabel('Date'));
    const dateInput = document.createElement('input');
    dateInput.type = 'date';
    dateInput.className = 'sheet-input';
    dateInput.value = workingDate;
    dateInput.addEventListener('change', () => { workingDate = dateInput.value; });
    dateField.appendChild(dateInput);
    body.appendChild(dateField);

    // Time
    const timeField = document.createElement('div');
    timeField.className = 'sheet-field';
    timeField.appendChild(sheetLabel('Time'));
    const timePicker = buildTimePicker({ value: workingTime, onChange: (v) => { workingTime = v; } });
    timeField.appendChild(timePicker.element);
    body.appendChild(timeField);

    // Type
    const typeField = document.createElement('div');
    typeField.className = 'sheet-field';
    typeField.appendChild(sheetLabel('Class type'));
    const typePicker = buildClassTypePicker({ value: workingType, onChange: (v) => { workingType = v; } });
    typeField.appendChild(typePicker.element);
    body.appendChild(typeField);

    // Notes
    const notesField = document.createElement('div');
    notesField.className = 'sheet-field';
    notesField.appendChild(sheetLabel('Notes'));
    const notesTa = document.createElement('textarea');
    notesTa.className = 'sheet-textarea';
    notesTa.rows = 3;
    notesTa.placeholder = 'Add a note…';
    notesTa.value = workingNotes;
    notesTa.addEventListener('input', () => { workingNotes = notesTa.value; });
    notesField.appendChild(notesTa);
    body.appendChild(notesField);

    // Playlist (readonly, opens picker)
    const playlistField = document.createElement('div');
    playlistField.className = 'sheet-field';
    playlistField.appendChild(sheetLabel('Playlist'));
    const playlistRow = document.createElement('button');
    playlistRow.type = 'button';
    playlistRow.className = 'a-field-row';
    playlistRow.style.cssText = 'border-radius:14px;border:1.5px solid var(--border-medium);padding:12px 14px;background:var(--surface);width:100%;';
    function renderPlaylistRow() {
      playlistRow.innerHTML = `
        <div class="a-field-row__label">Playlist</div>
        <div class="a-field-row__value${workingPlaylist ? '' : ' a-field-row__value--placeholder'}">
          ${workingPlaylist ? '#' + esc(workingPlaylist) : 'Tap to choose'}
          <span class="chev">${ICONS.chevR}</span>
        </div>`;
    }
    renderPlaylistRow();
    playlistRow.addEventListener('click', () => {
      // Make sure the temp class state mirrors what's working
      const tempCls = { ...cls, attendees: workingAttendees, classType: workingType, playlist: workingPlaylist, date: workingDate, time: workingTime };
      // Use a temp put so the picker reads the working roster.
      state.weeklyPlan.set(dateTimeKey, tempCls);
      openPlaylistPickerSheet(dateTimeKey, (newPl) => {
        workingPlaylist = newPl;
        renderPlaylistRow();
        // Don't persist yet — wait for Save Draft / Finalize.
      });
    });
    playlistField.appendChild(playlistRow);
    body.appendChild(playlistField);

    // Attendees
    const guestField = document.createElement('div');
    guestField.className = 'sheet-field';
    guestField.appendChild(sheetLabel('Attendees'));
    const guestPicker = buildGuestPicker({
      initialSelected: workingAttendees,
      onChange: (s) => { workingAttendees = s; }
    });
    guestField.appendChild(guestPicker.element);
    body.appendChild(guestField);

    // Delete link
    const delLink = document.createElement('button');
    delLink.type = 'button';
    delLink.className = 'a-delete-link';
    delLink.style.marginTop = '12px';
    delLink.textContent = 'Delete class';
    body.appendChild(delLink);

    // Persist helper
    async function persist({ status, alsoFinalize = false }) {
      // Handle date/time change (key change): if dateTimeKey changes,
      // delete the old and write the new.
      const newKey = createDateTimeKey(workingDate, workingTime);
      const newCls = {
        date: workingDate,
        time: normalizeTime(workingTime),
        playlist: workingPlaylist || '',
        attendees: workingAttendees,
        status,
        notes: workingNotes || '',
        classType: workingType || '',
        dateTimeKey: newKey
      };
      // Update local state.
      if (newKey !== dateTimeKey) {
        state.weeklyPlan.delete(dateTimeKey);
      }
      state.weeklyPlan.set(newKey, newCls);
      saveStateToLocalStorage();

      let ok = true;
      if (state.firebaseUser) {
        if (newKey !== dateTimeKey) {
          try { await deleteClassFromFirestore(dateTimeKey); } catch (e) {}
        }
        ok = await saveClassToFirestore(newKey, newCls);
        if (ok && alsoFinalize) {
          await writeRecordsToFirestore({
            date: newCls.date,
            time: newCls.time,
            playlist: newCls.playlist,
            attendees: newCls.attendees
          });
        }
      }
      return ok;
    }

    // Footer (sticky)
    const draftBtn = document.createElement('button');
    draftBtn.type = 'button';
    draftBtn.className = 'hilo-btn hilo-btn--ghost';
    draftBtn.textContent = 'Save draft';
    draftBtn.addEventListener('click', async () => {
      setLoading(draftBtn, true);
      try {
        const ok = await persist({ status: 'draft' });
        if (ok) {
          showToast('Draft saved', 'success');
          renderApp();

    field.appendChild(errorEl);

    addBtn.type = 'button';
    addBtn.className = 'hilo-btn hilo-btn--primary';
    addBtn.innerHTML = `${ICONS.check}<span>Add guest</span>`;

      const name = (input.value || '').trim();
      if (!name) {
        errorEl.textContent = 'Name cannot be empty.';
        errorEl.style.display = 'block';
        return;
      }
      // Case-insensitive duplicate check.
      const lower = name.toLowerCase();
      const exists = Array.from(state.allGuests).some(g => g.toLowerCase() === lower);
      if (exists) {
        errorEl.textContent = 'A guest with that name already exists.';
        errorEl.style.display = 'block';
        return;
      }
      state.allGuests.add(name);
      saveStateToLocalStorage();
      if (typeof onAdd === 'function') onAdd(name);
      closeSheet();
      showToast('Guest added', 'success');
    });

    body.appendChild(buildSheetActions([cancelBtn, addBtn]));

    openSheet({ title: 'Add Guest', body, height: 'short' });
    setTimeout(() => input.focus(), 250);

  async function startGoogleSignIn() {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      await auth.signInWithPopup(provider);
    } catch (err) {
      const code = err && err.code;
      const popupBlocked = code === 'auth/popup-blocked'
        || code === 'auth/popup-closed-by-user'
        || code === 'auth/operation-not-supported-in-this-environment';
      if (popupBlocked) {
        try { await auth.signInWithRedirect(provider); } catch (e2) {
          showToast('Sign-in failed: ' + (e2.message || 'unknown error'), 'error');
        }
      } else {
        showToast('Sign-in failed: ' + (err.message || 'unknown error'), 'error');
      }
    }
  }
